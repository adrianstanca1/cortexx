<style>
/* Print stylesheet — when window.print() is called, strip Cortexx chrome
   (status bar, tab bar, FAB, etc.) so output is a clean A4 document. */
@media print {
  body { background: white !important; color: #000 !important; }
  /* Hide the iPhone frame, status bar, tab bar, floating buttons, sheet chrome */

  [data-print-hide], [class*="MobileHeader"] button,
  button[style*="position: fixed"], div[style*="position: fixed"][style*="bottom"] {

  /* Force readable text */

      box-shadow: none !important; border-color: #ccc !important; }
  a { text-decoration: underline; }
  /* Anything scrollable becomes full flow */

}

<body>

<div class="header">

<div class="stage"><div id="root"></div></div>

<div class="footer">5 tabs · 12 dashboards · sheets · live Cortex AI · <a href="Cortexx Mobile Dashboard.html">view all variations →</a></div>

<script>
  // ───────────────────────────────────────────────────────────
  // Cortexx — smart loader
  //   ?dev=1 in URL  → load .jsx from lib/ and transform in-browser via Babel
  //   default        → load precompiled .js from dist/ (zero Babel cost)
  // Cold-start time is exposed at window.__cortexxBoot.
  // ───────────────────────────────────────────────────────────
  window.__cortexxBoot = performance.now();
  const DEV_MODE = new URLSearchParams(location.search).has('dev')
                || location.hostname === 'localhost'
                || location.hostname === '127.0.0.1';
  window.__cortexxDevMode = DEV_MODE;

  // Module list in load order. Keep in sync with the JSX sources in lib/.
  const MODULES = [
    'ios-frame', 'tweaks-panel', 'tokens',
    'dashboards', 'dashboards-v2', 'dashboards-v3', 'dashboards-v4', 'dashboards-v5',
    'backend', 'backend-extras',
    'perf-phase71', 'perf-phase81',
    'app-screens', 'app-sheets', 'app-screens-2', 'app-utils',
    'screens-ops', 'screens-project',
    'screens-phase2','screens-phase3','screens-phase4','screens-phase5','screens-phase6',
    'screens-phase7','screens-phase8','screens-phase9','screens-phase10','screens-phase11',
    'screens-phase12','screens-phase13','screens-phase14','screens-phase15','screens-phase16',
    'screens-phase17','screens-phase18','screens-phase19','screens-phase20',
    'screens-phase21-30',
    'screens-phase31','screens-phase32','screens-phase33','screens-phase34','screens-phase35',
    'screens-phase36','screens-phase37','screens-phase38','screens-phase39','screens-phase40',
    'screens-phase41-50','screens-phase51-70',
    'screens-phase72','screens-phase73','screens-phase74','screens-phase75','screens-phase76',
    'screens-phase77','screens-phase78','screens-phase79','screens-phase80',
    'app-main',
    'boot',
  ];
  // Files that are plain JS (not JSX) — they go through <script src> even in dev.
  const PLAIN_JS = new Set(['backend', 'backend-extras', 'perf-phase71', 'perf-phase81']);

  // 1) Load React + (dev only) Babel
  function injectExternal(src, integrity) {
    return new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src; s.crossOrigin = 'anonymous';
      if (integrity) s.integrity = integrity;
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  function injectLocal(src, kind) {
    return new Promise((res, rej) => {
      const s = document.createElement('script');
      if (kind === 'babel') {
        // Dynamically-injected <script type="text/babel" src=...> does NOT
        // auto-transform; we must fetch + transform + inline.
        fetch(src)
          .then(r => r.text())
          .then(code => {
            const out = window.Babel.transform(code, {
              presets: [['react', { runtime: 'classic' }]],
              compact: false, comments: false, sourceType: 'script',
            }).code;
            const s2 = document.createElement('script');
            s2.textContent = out;
            document.head.appendChild(s2);
            res();
          })
          .catch(rej);
      } else {
        s.src = src;
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      }
    });
  }

  (async () => {
    await injectExternal(
      'https://unpkg.com/react@18.3.1/umd/react.development.js',
      'sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L'
    );
    await injectExternal(
      'https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js',
      'sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm'
    );
    if (DEV_MODE) {
      await injectExternal(
        'https://unpkg.com/@babel/standalone@7.29.0/babel.min.js',
        'sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y'
      );
    }
    // Modules don't all need to load serially, but ORDER matters because they
    // share global scope. Load them serially to preserve order; Babel handles
    // both <script type=text/babel> and <script src> sequentially anyway.
    for (const name of MODULES) {
      const isPlain = PLAIN_JS.has(name);
      if (DEV_MODE) {
        const path = isPlain ? `lib/${name}.js` : `lib/${name}.jsx`;
        await injectLocal(path, isPlain ? 'js' : 'babel');
      } else {
        // Production: every module ships as plain JS from dist/
        await injectLocal(`dist/${name}.js`, 'js');
      }
    }
    // Boot the root tree (defined inline below)
    if (window.__cortexxBootApp) window.__cortexxBootApp();
  })().catch(err => {
    document.body.insertAdjacentHTML('beforeend',
      `<pre style="color:#ef4444;padding:18px;font:12px monospace;">Cortexx load failed:\n${err && err.message || err}</pre>`);
  });
</script>

<script type="text/babel">
// (Legacy inline bootstrap — kept for fallback. In normal mode the loader uses
//  dist/boot.js which is the precompiled version of lib/boot.jsx.)
</script>
<script>
// Register service worker for offline + PWA install
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
