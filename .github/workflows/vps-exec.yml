name: VPS Exec
# Ad-hoc SSH bridge: run an arbitrary shell command on the production VPS
# and dump stdout/stderr to the workflow log. Triggered only by
# workflow_dispatch — repo write access is the auth gate. The `command`
# input is logged at trigger time, so don't pass secrets through it; use
# repo/env secrets instead.

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Shell command to run on the VPS (executed via `bash -c`).'
        required: true
        type: string
      timeout_s:
        description: 'Kill the command after N seconds (default 300, max 1800).'
        required: false
        type: string
        default: '300'

concurrency:
  group: vps-exec
  cancel-in-progress: false

jobs:
  exec:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
          ssh-keyscan -H 72.62.132.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run command on VPS
        id: ssh
        env:
          CMD: ${{ inputs.command }}
          TIMEOUT_S: ${{ inputs.timeout_s }}
        run: |
          # Clamp timeout
          t=${TIMEOUT_S:-300}
          if ! [[ "$t" =~ ^[0-9]+$ ]] || [ "$t" -lt 1 ]; then t=300; fi
          if [ "$t" -gt 1800 ]; then t=1800; fi

          echo "::group::VPS command"
          printf '%s\n' "$CMD"
          echo "::endgroup::"

          set +e
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -i ~/.ssh/cortexx_deploy \
              root@72.62.132.43 \
              "timeout --signal=KILL ${t}s bash -lc \"\$(cat)\"" <<< "$CMD" \
              > /tmp/vps-out.txt 2>&1
          rc=$?
          set -e

          # Echo to job log for humans
          cat /tmp/vps-out.txt
          echo "::notice title=VPS exec exit code::$rc"
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Mirror output to a dedicated branch
        # Persists every invocation's output to the orphan `vps-exec-logs`
        # branch as `latest.txt` (always overwritten) + `runs/<id>.txt`
        # (appended history). Uses the Contents API so the api.github.com-
        # restricted sandbox can read results without touching
        # results-receiver.actions.githubusercontent.com.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CMD: ${{ inputs.command }}
          RC: ${{ steps.ssh.outputs.exit_code }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: vps-exec-logs
        run: |
          # Build the file payload — header + command + raw output, trimmed
          # to 800 kB to stay below GitHub's 1 MB file ceiling.
          {
            echo "run_id: $RUN_ID"
            echo "exit_code: ${RC:-unknown}"
            echo "completed_at: $(date -u +%FT%TZ)"
            echo "command: |"
            printf '%s\n' "$CMD" | sed 's/^/  /'
            echo "---"
            head -c 800000 /tmp/vps-out.txt
          } > /tmp/payload.txt
          b64=$(base64 -w0 /tmp/payload.txt)

          # Ensure the branch exists (orphan, no shared history with main).
          if ! gh api "repos/$REPO/branches/$BRANCH" >/dev/null 2>&1; then
            empty_tree=$(gh api "repos/$REPO/git/trees" -X POST -f 'tree=[]' --jq '.sha' 2>/dev/null) || true
            if [ -z "$empty_tree" ]; then
              # Fallback: well-known SHA of git's empty tree
              empty_tree='4b825dc642cb6eb9a060e54bf8d69288fbee4904'
            fi
            commit=$(gh api "repos/$REPO/git/commits" -X POST \
              -f message='chore(vps-exec): initialise output branch' \
              -f tree="$empty_tree" \
              -F 'parents=[]' --jq '.sha')
            gh api "repos/$REPO/git/refs" -X POST \
              -f "ref=refs/heads/$BRANCH" -f "sha=$commit" >/dev/null
          fi

          put_file() {
            local path="$1"
            # Look up existing file sha (required for update)
            local sha
            sha=$(gh api "repos/$REPO/contents/$path?ref=$BRANCH" --jq '.sha' 2>/dev/null || true)
            if [ -n "$sha" ] && [ "$sha" != "null" ]; then
              gh api "repos/$REPO/contents/$path" -X PUT \
                -f "message=vps-exec run $RUN_ID — $path" \
                -f "content=$b64" \
                -f "branch=$BRANCH" \
                -f "sha=$sha" >/dev/null
            else
              gh api "repos/$REPO/contents/$path" -X PUT \
                -f "message=vps-exec run $RUN_ID — $path" \
                -f "content=$b64" \
                -f "branch=$BRANCH" >/dev/null
            fi
          }

          put_file "latest.txt"
          put_file "runs/${RUN_ID}.txt"

          echo "::notice title=Output mirror::https://github.com/$REPO/blob/$BRANCH/latest.txt"

      - name: Propagate exit code
        if: always()
        env:
          RC: ${{ steps.ssh.outputs.exit_code }}
        run: exit "${RC:-1}"
