name: VPS Exec
# Ad-hoc SSH bridge: run an arbitrary shell command on the production VPS
# and dump stdout/stderr to the workflow log. Triggered only by
# workflow_dispatch — repo write access is the auth gate. The `command`
# input is logged at trigger time, so don't pass secrets through it; use
# repo/env secrets instead.

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Shell command to run on the VPS (executed via `bash -c`).'
        required: true
        type: string
      timeout_s:
        description: 'Kill the command after N seconds (default 300, max 1800).'
        required: false
        type: string
        default: '300'

concurrency:
  group: vps-exec
  cancel-in-progress: false

jobs:
  exec:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      issues: write
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
          ssh-keyscan -H 72.62.132.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run command on VPS
        id: ssh
        env:
          CMD: ${{ inputs.command }}
          TIMEOUT_S: ${{ inputs.timeout_s }}
        run: |
          # Clamp timeout
          t=${TIMEOUT_S:-300}
          if ! [[ "$t" =~ ^[0-9]+$ ]] || [ "$t" -lt 1 ]; then t=300; fi
          if [ "$t" -gt 1800 ]; then t=1800; fi

          echo "::group::VPS command"
          printf '%s\n' "$CMD"
          echo "::endgroup::"

          set +e
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -i ~/.ssh/cortexx_deploy \
              root@72.62.132.43 \
              "timeout --signal=KILL ${t}s bash -lc \"\$(cat)\"" <<< "$CMD" \
              > /tmp/vps-out.txt 2>&1
          rc=$?
          set -e

          # Echo to job log for humans
          cat /tmp/vps-out.txt
          echo "::notice title=VPS exec exit code::$rc"
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Post output to tracking issue
        # Persists every invocation's output as a comment on a sticky issue
        # so the api.github.com-only sandbox can read results without
        # touching results-receiver.actions.githubusercontent.com.
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CMD: ${{ inputs.command }}
          RC: ${{ steps.ssh.outputs.exit_code }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # Find or create the sticky tracking issue (no label — keeps
          # the workflow agnostic to repo label setup).
          issue=$(gh issue list --search 'in:title "vps-exec output stream"' --state open --json number --jq '.[0].number // empty')
          if [ -z "$issue" ]; then
            gh issue create \
              --title 'vps-exec output stream' \
              --body 'Sticky issue collecting outputs from `.github/workflows/vps-exec.yml`. Each run appends one comment with the command, exit code, and output. Used as an API-readable channel because the sandbox running automation cannot reach `results-receiver.actions.githubusercontent.com`.'
            issue=$(gh issue list --search 'in:title "vps-exec output stream"' --state open --json number --jq '.[0].number // empty')
          fi
          if [ -z "$issue" ]; then
            echo "::error::could not find or create tracking issue"
            exit 1
          fi

          # Truncate to 60kB to stay well under GitHub's 64kB comment limit
          out=$(head -c 60000 /tmp/vps-out.txt)
          truncated=$([ "$(wc -c < /tmp/vps-out.txt)" -gt 60000 ] && echo ' [truncated]' || echo '')

          {
            echo "**Run [$RUN_ID](https://github.com/${{ github.repository }}/actions/runs/$RUN_ID)** — exit \`$RC\`$truncated"
            echo
            echo '<details><summary>Command</summary>'
            echo
            echo '```'
            printf '%s\n' "$CMD"
            echo '```'
            echo '</details>'
            echo
            echo '```'
            printf '%s\n' "$out"
            echo '```'
          } > /tmp/comment.md

          gh issue comment "$issue" --body-file /tmp/comment.md

      - name: Propagate exit code
        if: always()
        env:
          RC: ${{ steps.ssh.outputs.exit_code }}
        run: exit "${RC:-1}"
