name: VPS Exec
# Ad-hoc SSH bridge: run an arbitrary shell command on the production VPS
# and dump stdout/stderr to the workflow log. Triggered only by
# workflow_dispatch — repo write access is the auth gate. The `command`
# input is logged at trigger time, so don't pass secrets through it; use
# repo/env secrets instead.

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Shell command to run on the VPS (executed via `bash -c`).'
        required: true
        type: string
      timeout_s:
        description: 'Kill the command after N seconds (default 300, max 1800).'
        required: false
        type: string
        default: '300'

concurrency:
  group: vps-exec
  cancel-in-progress: false

jobs:
  exec:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
          ssh-keyscan -H 72.62.132.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run command on VPS
        id: ssh
        env:
          CMD: ${{ inputs.command }}
          TIMEOUT_S: ${{ inputs.timeout_s }}
        run: |
          # Clamp timeout
          t=${TIMEOUT_S:-300}
          if ! [[ "$t" =~ ^[0-9]+$ ]] || [ "$t" -lt 1 ]; then t=300; fi
          if [ "$t" -gt 1800 ]; then t=1800; fi

          echo "::group::VPS command"
          printf '%s\n' "$CMD"
          echo "::endgroup::"

          set +e
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -i ~/.ssh/cortexx_deploy \
              root@72.62.132.43 \
              "timeout --signal=KILL ${t}s bash -lc \"\$(cat)\"" <<< "$CMD" \
              > /tmp/vps-out.txt 2>&1
          rc=$?
          set -e

          # Echo to job log for humans
          cat /tmp/vps-out.txt
          echo "::notice title=VPS exec exit code::$rc"
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"

      - name: Checkout (for mirror branch work)
        if: always()
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Mirror output to vps-exec-logs branch
        # Persists every invocation's output to an orphan `vps-exec-logs`
        # branch as `latest.txt` (always overwritten) + `runs/<id>.txt`
        # (history). Vanilla git so we don't fight the Contents API's
        # raw/typed-field quirks. Read side from api.github.com-only
        # clients:
        #   gh api repos/<o>/<r>/contents/latest.txt?ref=vps-exec-logs \
        #     --jq .content | base64 -d
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CMD: ${{ inputs.command }}
          RC: ${{ steps.ssh.outputs.exit_code }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: vps-exec-logs
        run: |
          # Build payload — capped at 800 kB to stay under GitHub's 1 MB
          # blob ceiling
          {
            echo "run_id: $RUN_ID"
            echo "exit_code: ${RC:-unknown}"
            echo "completed_at: $(date -u +%FT%TZ)"
            echo "command: |"
            printf '%s\n' "$CMD" | sed 's/^/  /'
            echo "---"
            head -c 800000 /tmp/vps-out.txt
          } > /tmp/payload.txt

          # Work in a clean throwaway dir so we don't mutate the
          # checkout's main worktree
          work=$(mktemp -d)
          cd "$work"
          git init -q -b "$BRANCH"
          git config user.email 'cortexx-bot@users.noreply.github.com'
          git config user.name 'vps-exec bot'

          # Try to seed from the remote branch; if it doesn't exist yet,
          # we'll create it as an orphan with this run as the first commit
          if git fetch -q "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$BRANCH" 2>/dev/null; then
            git reset -q --hard FETCH_HEAD
          fi

          mkdir -p runs
          cp /tmp/payload.txt latest.txt
          cp /tmp/payload.txt "runs/${RUN_ID}.txt"

          git add -A
          git commit -q -m "vps-exec run ${RUN_ID} (exit ${RC:-?})"
          git push -q "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "HEAD:refs/heads/${BRANCH}"

          echo "::notice title=Output mirror::https://github.com/${{ github.repository }}/blob/${BRANCH}/latest.txt"

      - name: Propagate exit code
        if: always()
        env:
          RC: ${{ steps.ssh.outputs.exit_code }}
        run: exit "${RC:-1}"
