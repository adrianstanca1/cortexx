name: Re-seed production
on:
  workflow_dispatch:
jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Hit /api/seed and verify
        run: |
          {
            echo "=== POST /api/seed ==="
            curl -s -X POST https://cortexbuildpro.com/api/seed
            echo ""
            echo ""
            sleep 3
            echo "=== /api/dashboard (cache-busted) ==="
            curl -s "https://cortexbuildpro.com/api/dashboard?_=$(date +%s)" | head -c 800
            echo ""
            echo ""
            echo "=== /api/projects ==="
            curl -s https://cortexbuildpro.com/api/projects | head -c 500
            echo ""
            echo ""
            echo "=== /api/tasks ==="
            curl -s https://cortexbuildpro.com/api/tasks | head -c 400
            echo ""
            echo ""
            echo "=== /api/team ==="
            curl -s https://cortexbuildpro.com/api/team | head -c 400
          } > seed_result.txt 2>&1
          cat seed_result.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add seed_result.txt
          git commit -m "chore: seed result [skip ci]" || true
          git push || true
