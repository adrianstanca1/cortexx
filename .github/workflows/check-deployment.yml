name: Check Deployment Status

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get Hostinger deployment logs
        env:
          API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          echo "=== Listing JS deployments ==="
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"hosting_listJsDeployments","arguments":{"domain":"cortexbuildpro.com"}}}' \
            | npx hostinger-api-mcp@latest --stdio 2>/dev/null

          echo ""
          echo "=== Deployment logs ==="
          echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"hosting_showJsDeploymentLogs","arguments":{"domain":"cortexbuildpro.com"}}}' \
            | npx hostinger-api-mcp@latest --stdio 2>/dev/null

      - name: Check DNS resolution
        run: |
          echo "=== DNS lookup ==="
          nslookup cortexbuildpro.com || true
          dig cortexbuildpro.com +short || true

      - name: Test live site
        run: |
          echo "=== HTTP check ==="
          curl -sv --max-time 15 https://cortexbuildpro.com 2>&1 | head -40 || true
          echo ""
          echo "=== API check ==="
          curl -s --max-time 15 https://cortexbuildpro.com/api/dashboard 2>&1 | head -200 || true
