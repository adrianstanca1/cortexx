name: Deploy to Hostinger VPS

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
          ssh-keyscan -H 72.62.132.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify SSH access
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'echo SSH_OK && uname -a'

      - name: Install missing tools (without touching existing stack)
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
            set -e
            export DEBIAN_FRONTEND=noninteractive

            # Only install what's missing — NEVER touch Postgres (in Docker), MySQL (in Docker),
            # or existing nginx configs.
            need_install=()

            command -v node >/dev/null 2>&1 || need_install+=(nodejs)
            command -v git >/dev/null 2>&1 || need_install+=(git)
            command -v nginx >/dev/null 2>&1 || need_install+=(nginx)

            if [ "${#need_install[@]}" -gt 0 ]; then
              echo "Installing: ${need_install[*]}"
              # Add Node.js 20 repo only if node missing
              if [[ " ${need_install[*]} " == *" nodejs "* ]]; then
                curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              fi
              apt-get update -qq
              apt-get install -y "${need_install[@]}"
            else
              echo "All base tools present"
            fi

            command -v pm2 >/dev/null 2>&1 || npm install -g pm2
            echo "Node: $(node -v) | npm: $(npm -v) | pm2: $(pm2 -v)"
          REMOTE

      - name: Create cortexx database in existing Docker Postgres
        id: db
        run: |
          DB_PASS=$(openssl rand -hex 16)
          echo "::add-mask::$DB_PASS"
          echo "db_pass=$DB_PASS" >> $GITHUB_OUTPUT

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 "bash -s '$DB_PASS'" << 'REMOTE'
            set -e
            DB_PASS=$1

            # Find a running Postgres container
            PG_CONTAINER=$(docker ps --filter "expose=5432" --format '{{.ID}}' | head -1)
            if [ -z "$PG_CONTAINER" ]; then
              PG_CONTAINER=$(docker ps --format '{{.Names}}' | grep -i postgres | head -1)
            fi
            if [ -z "$PG_CONTAINER" ]; then
              echo "No Postgres container found"
              docker ps --format '{{.Names}}: {{.Image}}'
              exit 1
            fi
            echo "Using Postgres container: $PG_CONTAINER"

            # Get the superuser from env (most likely POSTGRES_USER or "postgres")
            PG_SUPER=$(docker inspect $PG_CONTAINER --format '{{range .Config.Env}}{{println .}}{{end}}' | grep ^POSTGRES_USER= | cut -d= -f2)
            PG_SUPER=${PG_SUPER:-postgres}
            echo "Superuser: $PG_SUPER"

            # Create user + db (idempotent)
            docker exec -i $PG_CONTAINER psql -U "$PG_SUPER" -tc \
              "SELECT 1 FROM pg_user WHERE usename='cortexx'" | grep -q 1 || \
              docker exec -i $PG_CONTAINER psql -U "$PG_SUPER" -c \
                "CREATE USER cortexx WITH PASSWORD '$DB_PASS';"

            docker exec -i $PG_CONTAINER psql -U "$PG_SUPER" -c \
              "ALTER USER cortexx WITH PASSWORD '$DB_PASS';"

            docker exec -i $PG_CONTAINER psql -U "$PG_SUPER" -tc \
              "SELECT 1 FROM pg_database WHERE datname='cortexx'" | grep -q 1 || \
              docker exec -i $PG_CONTAINER psql -U "$PG_SUPER" -c \
                "CREATE DATABASE cortexx OWNER cortexx;"

            docker exec -i $PG_CONTAINER psql -U "$PG_SUPER" -c \
              "GRANT ALL PRIVILEGES ON DATABASE cortexx TO cortexx;"

            echo "Database 'cortexx' ready"
          REMOTE

      - name: Deploy Cortexx app on port 3010
        env:
          DB_PASS: ${{ steps.db.outputs.db_pass }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 "bash -s '$DB_PASS'" << 'REMOTE'
            set -e
            DB_PASS=$1
            APP_DIR=/opt/cortexx
            APP_PORT=3010

            echo "=== Clone/update repo ==="
            if [ -d $APP_DIR/.git ]; then
              cd $APP_DIR
              git fetch origin
              git reset --hard origin/main
            else
              rm -rf $APP_DIR
              git clone https://github.com/adrianstanca1/cortexx.git $APP_DIR
              cd $APP_DIR
            fi

            cat > $APP_DIR/.env.production << ENV
          DATABASE_URL=postgresql://cortexx:$DB_PASS@localhost:5432/cortexx
          NODE_ENV=production
          PORT=$APP_PORT
          ENV
            chmod 600 $APP_DIR/.env.production

            echo "=== Install deps ==="
            cd $APP_DIR
            npm ci --include=dev

            echo "=== Prisma generate + push ==="
            npx prisma generate
            npx prisma db push --accept-data-loss

            echo "=== Build ==="
            npm run build

            echo "=== Start/restart with pm2 ==="
            pm2 delete cortexx 2>/dev/null || true
            cd $APP_DIR
            PORT=$APP_PORT pm2 start npm --name cortexx -- start
            pm2 save
            (pm2 startup systemd -u root --hp /root 2>&1 | grep "sudo " | bash) || true

            sleep 6
            curl -s -o /dev/null -w "App on :$APP_PORT → HTTP %{http_code}\n" http://localhost:$APP_PORT/
          REMOTE

      - name: Configure nginx for cortexbuildpro.com only
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
            set -e

            # Back up the existing cortexbuildpro.com config(s)
            BACKUP=/root/nginx-backup-$(date +%s)
            mkdir -p $BACKUP
            for f in /etc/nginx/sites-available/*; do
              if grep -l "cortexbuildpro.com" "$f" >/dev/null 2>&1; then
                cp "$f" "$BACKUP/$(basename $f).bak"
                echo "Backed up: $f"
              fi
            done

            # Find and disable existing cortexbuildpro.com sites
            for f in /etc/nginx/sites-enabled/*; do
              if [ -L "$f" ] && grep -l "cortexbuildpro.com" "$(readlink -f $f)" >/dev/null 2>&1; then
                echo "Removing: $f"
                rm "$f"
              fi
            done

            # Inherit SSL cert path from existing config (if any) — search backup
            SSL_FULLCHAIN=""
            SSL_PRIVKEY=""
            if [ -f /etc/letsencrypt/live/cortexbuildpro.com/fullchain.pem ]; then
              SSL_FULLCHAIN=/etc/letsencrypt/live/cortexbuildpro.com/fullchain.pem
              SSL_PRIVKEY=/etc/letsencrypt/live/cortexbuildpro.com/privkey.pem
            fi

            cat > /etc/nginx/sites-available/cortexx << 'NGINX'
          server {
              listen 80;
              listen [::]:80;
              server_name cortexbuildpro.com www.cortexbuildpro.com;

              location /.well-known/acme-challenge/ {
                  root /var/www/html;
              }

              location / {
                  proxy_pass http://127.0.0.1:3010;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 90s;
                  proxy_buffering off;
              }

              # SSE keep-alive support
              location /api/events/ {
                  proxy_pass http://127.0.0.1:3010;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_buffering off;
                  proxy_cache off;
                  proxy_read_timeout 1h;
                  chunked_transfer_encoding off;
              }
          }
          NGINX

            if [ -n "$SSL_FULLCHAIN" ]; then
              cat >> /etc/nginx/sites-available/cortexx << NGINX_HTTPS
          server {
              listen 443 ssl http2;
              listen [::]:443 ssl http2;
              server_name cortexbuildpro.com www.cortexbuildpro.com;

              ssl_certificate $SSL_FULLCHAIN;
              ssl_certificate_key $SSL_PRIVKEY;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers HIGH:!aNULL:!MD5;

              location / {
                  proxy_pass http://127.0.0.1:3010;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache_bypass \$http_upgrade;
                  proxy_read_timeout 90s;
                  proxy_buffering off;
              }

              location /api/events/ {
                  proxy_pass http://127.0.0.1:3010;
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_buffering off;
                  proxy_cache off;
                  proxy_read_timeout 1h;
                  chunked_transfer_encoding off;
              }
          }
          NGINX_HTTPS
              echo "Including HTTPS server block"
            fi

            ln -sf /etc/nginx/sites-available/cortexx /etc/nginx/sites-enabled/cortexx
            echo "=== Testing nginx config ==="
            nginx -t
            echo "=== Reloading nginx ==="
            systemctl reload nginx
            echo "Other enabled sites (preserved):"
            ls /etc/nginx/sites-enabled/
          REMOTE

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'curl -s -o /dev/null -w "Local 3010: HTTP %{http_code}\n" http://localhost:3010/'
          echo ""
          sleep 4
          echo "=== Public HTTPS ==="
          curl -s -o /dev/null -w "https://cortexbuildpro.com → HTTP %{http_code}\n" https://cortexbuildpro.com/
          echo "=== Sample HTML ==="
          curl -sL --max-time 10 https://cortexbuildpro.com/ | head -c 400 || true
          echo ""
          echo "=== /api/health ==="
          curl -s --max-time 10 https://cortexbuildpro.com/api/health | head -c 300

      - name: Seed database
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://cortexbuildpro.com/api/seed)
          echo "Seed: HTTP $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            curl -s https://cortexbuildpro.com/api/dashboard | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(f'Projects: {len(d.get(\"projects\",[]))}, Tasks: {len(d.get(\"tasks\",[]))}, Team: {len(d.get(\"team\",[]))}')
          "
          fi
