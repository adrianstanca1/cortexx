name: Deploy to Hostinger VPS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/health-monitor.yml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/debug-vps.yml'

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
          ssh-keyscan -H 72.62.132.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify SSH access (retry up to 8 times)
        run: |
          for attempt in 1 2 3 4 5 6 7 8; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/cortexx_deploy root@72.62.132.43 'echo SSH_OK && uname -a' 2>&1; then
              exit 0
            fi
            # Linear backoff: 5, 10, 15, 20, 25, 30, 35 (total ≤140s)
            wait=$((attempt * 5))
            echo "SSH attempt $attempt failed, waiting ${wait}s"
            sleep $wait
          done
          echo "SSH connection failed after 8 attempts"
          exit 1

      - name: Install missing tools
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
            set -e
            export DEBIAN_FRONTEND=noninteractive
            need=()
            command -v node >/dev/null 2>&1 || need+=(nodejs)
            command -v git >/dev/null 2>&1 || need+=(git)
            command -v nginx >/dev/null 2>&1 || need+=(nginx)
            command -v gzip >/dev/null 2>&1 || need+=(gzip)
            if [ ${#need[@]} -gt 0 ]; then
              if [[ " ${need[*]} " == *" nodejs "* ]]; then
                curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              fi
              apt-get update -qq
              apt-get install -y "${need[@]}"
            fi
            command -v pm2 >/dev/null 2>&1 || npm install -g pm2
            echo "Node: $(node -v) | pm2: $(pm2 -v)"
          REMOTE

      - name: Provision DB, backup, deploy app
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SEED_TOKEN: ${{ secrets.SEED_TOKEN }}
        run: |
          # Generate per-deploy DB password (rotated automatically — admin user is recreated by seed)
          DB_PASS=$(openssl rand -hex 16)
          echo "::add-mask::$DB_PASS"

          # Pass ALL secrets via the SSH env-var prefix — single SSH session, no cross-step file deps
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 \
            DB_PASS="$DB_PASS" \
            NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
            ADMIN_EMAIL="$ADMIN_EMAIL" \
            ADMIN_PASSWORD="$ADMIN_PASSWORD" \
            SEED_TOKEN="$SEED_TOKEN" \
            'bash -s' << 'REMOTE'
            set -euo pipefail
            APP_DIR=/opt/cortexx
            APP_PORT=3010
            BACKUP_DIR=/opt/cortexx-backups
            mkdir -p $BACKUP_DIR

            # ─── 1. Find Postgres container ───────────────────────────────
            PG_CONTAINER=""
            for c in $(docker ps --format '{{.Names}}'); do
              if docker port "$c" 2>/dev/null | grep -qE '5432/tcp -> (0\.0\.0\.0|::):5432'; then
                PG_CONTAINER="$c"; break
              fi
            done
            if [ -z "$PG_CONTAINER" ]; then
              echo "ERROR: No container is bound to host:5432"
              docker ps --format '{{.Names}}: {{.Image}} :: {{.Ports}}' >&2
              exit 1
            fi
            PG_IP=$(docker inspect "$PG_CONTAINER" --format '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}' | awk '{print $1}')
            PG_SUPER=$(docker inspect "$PG_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' | grep ^POSTGRES_USER= | cut -d= -f2 || true)
            PG_SUPER=${PG_SUPER:-postgres}
            echo "Container=$PG_CONTAINER IP=$PG_IP SUPER=$PG_SUPER"

            # ─── 2. Backup BEFORE any DB changes ──────────────────────────
            STAMP=$(date -u +%Y%m%d-%H%M%S)
            OUT="$BACKUP_DIR/cortexx-$STAMP.sql.gz"
            if docker exec "$PG_CONTAINER" pg_dump -U cortexx cortexx 2>/dev/null | gzip > "$OUT"; then
              echo "✓ Backup: $OUT ($(du -h "$OUT" | cut -f1))"
            else
              echo "⚠ pg_dump skipped (DB may be empty / new)"
              rm -f "$OUT"
            fi
            find "$BACKUP_DIR" -name '*.sql.gz' -mtime +30 -delete 2>/dev/null || true

            # ─── 3. Create/update user + database (idempotent) ────────────
            HAS_USER=$(docker exec -i "$PG_CONTAINER" psql -U "$PG_SUPER" -tAc "SELECT 1 FROM pg_user WHERE usename='cortexx'" 2>/dev/null || echo "")
            if [ "$HAS_USER" != "1" ]; then
              docker exec -i "$PG_CONTAINER" psql -U "$PG_SUPER" -c "CREATE USER cortexx WITH PASSWORD '$DB_PASS';"
              echo "✓ Created user cortexx"
            fi
            docker exec -i "$PG_CONTAINER" psql -U "$PG_SUPER" -c "ALTER USER cortexx WITH PASSWORD '$DB_PASS';" >/dev/null
            HAS_DB=$(docker exec -i "$PG_CONTAINER" psql -U "$PG_SUPER" -tAc "SELECT 1 FROM pg_database WHERE datname='cortexx'" 2>/dev/null || echo "")
            if [ "$HAS_DB" != "1" ]; then
              docker exec -i "$PG_CONTAINER" psql -U "$PG_SUPER" -c "CREATE DATABASE cortexx OWNER cortexx;"
              echo "✓ Created database cortexx"
            fi
            docker exec -i "$PG_CONTAINER" psql -U "$PG_SUPER" -c "GRANT ALL PRIVILEGES ON DATABASE cortexx TO cortexx;" >/dev/null
            echo "✓ DB ready"

            # ─── 4. Nightly backup cron (idempotent) ──────────────────────
            cat > /etc/cron.daily/cortexx-backup << 'CRON'
          #!/usr/bin/env bash
          set -e
          PG_CONTAINER=$(docker ps --format '{{.Names}}' | while read n; do
            if docker port "$n" 2>/dev/null | grep -qE '5432/tcp -> (0\.0\.0\.0|::):5432'; then echo "$n"; break; fi
          done)
          [ -z "$PG_CONTAINER" ] && exit 0
          mkdir -p /opt/cortexx-backups
          OUT="/opt/cortexx-backups/cortexx-$(date -u +%Y%m%d-%H%M%S).sql.gz"
          docker exec "$PG_CONTAINER" pg_dump -U cortexx cortexx 2>/dev/null | gzip > "$OUT" || rm -f "$OUT"
          find /opt/cortexx-backups -name '*.sql.gz' -mtime +30 -delete
          CRON
            chmod +x /etc/cron.daily/cortexx-backup

            # ─── 5. Build URL and clone/update repo ───────────────────────
            DB_URL="postgresql://cortexx:$DB_PASS@$PG_IP:5432/cortexx"

            if [ -d $APP_DIR/.git ]; then
              cd $APP_DIR
              git fetch origin
              git reset --hard origin/main
              rm -rf $APP_DIR/.next $APP_DIR/node_modules
            else
              rm -rf $APP_DIR
              git clone https://github.com/adrianstanca1/cortexx.git $APP_DIR
              cd $APP_DIR
            fi

            cat > $APP_DIR/.env.production << ENV
          DATABASE_URL=$DB_URL
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=https://cortexbuildpro.com
          NODE_ENV=production
          PORT=$APP_PORT
          ALLOW_SEED=true
          SEED_TOKEN=$SEED_TOKEN
          ADMIN_EMAIL=$ADMIN_EMAIL
          ADMIN_PASSWORD=$ADMIN_PASSWORD
          ENV
            chmod 600 $APP_DIR/.env.production
            echo "✓ .env.production written ($(wc -c < $APP_DIR/.env.production) bytes)"

            # ─── 6. Install + migrate + seed + build ──────────────────────
            cd $APP_DIR
            npm ci --include=dev 2>&1 | tail -5
            DATABASE_URL="$DB_URL" npx prisma generate 2>&1 | tail -3
            DATABASE_URL="$DB_URL" npx prisma migrate deploy 2>&1 | tail -10
            DATABASE_URL="$DB_URL" ADMIN_EMAIL="$ADMIN_EMAIL" ADMIN_PASSWORD="$ADMIN_PASSWORD" \
              npx prisma db seed 2>&1 | tail -8 || echo "Seed skipped"
            DATABASE_URL="$DB_URL" NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
              NEXTAUTH_URL=https://cortexbuildpro.com npm run build 2>&1 | tail -10

            # ─── 7. Restart pm2 (graceful reload keeps SSE open) ──────────
            if pm2 describe cortexx >/dev/null 2>&1; then
              pm2 reload cortexx --update-env
            else
              PORT=$APP_PORT pm2 start npm --name cortexx --update-env -- start
            fi
            pm2 save
            (pm2 startup systemd -u root --hp /root 2>&1 | grep "sudo " | bash) || true

            sleep 6
            curl -s -o /dev/null -w "App on :$APP_PORT → HTTP %{http_code}\n" http://localhost:$APP_PORT/
            curl -s --max-time 5 http://localhost:$APP_PORT/api/health
            echo ""
          REMOTE

      - name: Configure nginx for cortexbuildpro.com
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
            set -e

            BACKUP=/root/nginx-backup-$(date +%s)
            mkdir -p $BACKUP

            for f in /etc/nginx/sites-enabled/*; do
              [ -e "$f" ] || continue
              [ "$(basename $f)" = "cortexx" ] && continue
              SRC=$(readlink -f "$f" 2>/dev/null || echo "$f")
              DOMAINS=$(awk '
                /^\s*server_name/ { in_sn=1; gsub(/^\s*server_name\s*/, ""); }
                in_sn {
                  if (match($0, /;/)) { gsub(/;.*/, ""); in_sn=0; }
                  print
                }' "$SRC" 2>/dev/null | tr -s ' \t\n' '\n' | sed '/^$/d')
              MATCH=""
              for d in $DOMAINS; do
                if [ "$d" = "cortexbuildpro.com" ] || [ "$d" = "www.cortexbuildpro.com" ]; then
                  MATCH=1; break
                fi
              done
              if [ -n "$MATCH" ]; then
                cp "$SRC" "$BACKUP/$(basename $f).bak" 2>/dev/null || true
                echo "Removing $f (was serving cortexbuildpro.com)"
                rm "$f"
              fi
            done

            mkdir -p /var/www/html

            cat > /etc/nginx/sites-available/cortexx << 'NGINX'
          server {
              listen 80;
              listen [::]:80;
              server_name cortexbuildpro.com www.cortexbuildpro.com;

              client_max_body_size 25m;
              gzip on;
              gzip_types text/plain application/json application/javascript text/css application/xml image/svg+xml;
              gzip_min_length 1024;

              location /.well-known/acme-challenge/ {
                  root /var/www/html;
                  try_files $uri =404;
              }

              location /api/events/ {
                  proxy_pass http://127.0.0.1:3010;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_buffering off;
                  proxy_cache off;
                  proxy_read_timeout 1h;
                  chunked_transfer_encoding off;
              }

              location / {
                  proxy_pass http://127.0.0.1:3010;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 90s;
                  proxy_buffering off;
              }
          }
          NGINX

            ln -sf /etc/nginx/sites-available/cortexx /etc/nginx/sites-enabled/cortexx
            nginx -t
            systemctl reload nginx

            # Provision cert if missing
            if [ ! -f /etc/letsencrypt/live/cortexbuildpro.com/fullchain.pem ]; then
              command -v certbot >/dev/null 2>&1 || apt-get install -y certbot python3-certbot-nginx >/dev/null
              certbot certonly --webroot -w /var/www/html \
                -d cortexbuildpro.com -d www.cortexbuildpro.com \
                --non-interactive --agree-tos -m admin@cortexbuildpro.com --no-eff-email 2>&1 | tail -8 || true
            fi

            if [ -f /etc/letsencrypt/live/cortexbuildpro.com/fullchain.pem ]; then
              cat >> /etc/nginx/sites-available/cortexx << 'NGINX_HTTPS'

          server {
              listen 443 ssl http2;
              listen [::]:443 ssl http2;
              server_name cortexbuildpro.com www.cortexbuildpro.com;

              ssl_certificate /etc/letsencrypt/live/cortexbuildpro.com/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/cortexbuildpro.com/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers HIGH:!aNULL:!MD5;
              ssl_session_cache shared:SSL:10m;

              client_max_body_size 25m;
              gzip on;
              gzip_types text/plain application/json application/javascript text/css application/xml image/svg+xml;
              gzip_min_length 1024;

              location /api/events/ {
                  proxy_pass http://127.0.0.1:3010;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_buffering off;
                  proxy_cache off;
                  proxy_read_timeout 1h;
                  chunked_transfer_encoding off;
              }

              location / {
                  proxy_pass http://127.0.0.1:3010;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 90s;
                  proxy_buffering off;
              }
          }
          NGINX_HTTPS
              nginx -t
              systemctl reload nginx
              systemctl enable --now certbot.timer 2>/dev/null || true
            fi
          REMOTE

      - name: Verify deployment
        run: |
          sleep 5
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 \
            'curl -s -o /dev/null -w "Local 3010: HTTP %{http_code}\n" http://localhost:3010/'
          echo "=== Public ==="
          curl -s -o /dev/null -w "HTTPS root → %{http_code}\n" https://cortexbuildpro.com/
          curl -s -o /dev/null -w "HTTPS health → %{http_code}\n" https://cortexbuildpro.com/api/health
          curl -s -o /dev/null -w "HTTPS login → %{http_code}\n" https://cortexbuildpro.com/login
          echo "=== Health body ==="
          curl -s --max-time 10 https://cortexbuildpro.com/api/health
          echo ""
