name: Deploy to Hostinger VPS

# Deploys the Cortexx Docker stack (docker-compose.yml: api + db + ollama +
# caddy) to the Hostinger VPS. TLS + routing are handled by Traefik/Caddy that
# already run on the host, so this workflow only needs to pull the latest code
# and bring the containers up. This replaces the older Next.js/pm2/nginx
# workflow, which did not match the current containerised app and failed at the
# `systemctl reload nginx` step (nginx is not part of the stack).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/debug-vps.yml'

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
          ssh-keyscan -H 72.62.132.43 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Verify SSH access (retry up to 8 times)
        run: |
          for attempt in 1 2 3 4 5 6 7 8; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/cortexx_deploy root@72.62.132.43 'echo SSH_OK && uname -a' 2>&1; then
              exit 0
            fi
            wait=$((attempt * 5))
            echo "SSH attempt $attempt failed, waiting ${wait}s"
            sleep $wait
          done
          echo "SSH connection failed after 8 attempts"
          exit 1

      # The app containers can all be healthy while the site is still dark:
      # Traefik owns host ports 80/443 and runs outside this compose stack
      # (at /docker/traefik). If it is down or wedged, every public probe
      # times out even though `docker compose ps` looks fine — exactly the
      # failure mode of deploy runs 404/405. Diagnose the edge first and
      # restart Traefik when 443 is unresponsive from the host itself.
      - name: Ensure Traefik edge is up
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
            set -uo pipefail
            echo "=== containers ==="
            docker ps --format '{{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo "=== listeners on 80/443 ==="
            ss -tlnp | grep -E ':(80|443) ' || echo "NOTHING listening on 80/443"
            code=$(curl -sk --max-time 5 -o /dev/null -w '%{http_code}' https://127.0.0.1/ || true)
            echo "local https probe -> ${code:-000}"
            if [ "${code:-000}" = "000" ]; then
              echo "Edge unresponsive — attempting recovery"
              # Run 406 diagnostics: after a host reboot the legacy nginx
              # systemd unit (a leftover of the retired pm2/nginx stack)
              # grabs :80 before Traefik starts, and Traefik then crashloops
              # on "listen tcp :80: bind: address already in use" — leaving
              # :443 with no listener at all. Host nginx serves nothing in
              # the current stack (Traefik + containerised Caddy), so evict
              # it for good before restarting Traefik.
              if ss -tlnp | grep ':80 ' | grep -q nginx; then
                echo "Legacy host nginx holds port 80 — stopping and disabling it"
                systemctl stop nginx || true
                systemctl disable nginx || true
                systemctl mask nginx || true
              fi
              tname=$(docker ps -a --format '{{.Names}}' | grep -im1 traefik || true)
              echo "traefik container: ${tname:-<none found>}"
              [ -n "$tname" ] && docker logs --tail 30 "$tname" 2>&1 | tail -30 || true
              if [ -d /docker/traefik ]; then
                (cd /docker/traefik && docker compose up -d --force-recreate) || true
              elif [ -n "$tname" ]; then
                docker restart "$tname" || true
              fi
              sleep 10
              ss -tlnp | grep -E ':(80|443) ' || echo "STILL nothing on 80/443 after restart"
              curl -sk --max-time 5 -o /dev/null -w 'local https probe after restart -> %{http_code}\n' https://127.0.0.1/ || true
            fi
          REMOTE

      - name: Deploy via docker compose
        env:
          # Read-only token — only used to authenticate the git pull of this
          # (private) repo on the VPS. Scoped to this run.
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
            set -euo pipefail
            APP_DIR=/opt/cortexx

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "::error:: $APP_DIR is not a git checkout — aborting"
              exit 1
            fi
            cd "$APP_DIR"

            # Pull latest (origin is already set to the public URL on the VPS).
            git fetch origin
            git reset --hard origin/main
            echo "Checked out: $(git rev-parse --short HEAD)"

            # Bring the stack up. Build the api image; reuse the published
            # postgres/ollama/caddy images. `unless-stopped` restart policy is
            # already set in docker-compose.yml so this survives reboots.
            docker compose pull

            # Tolerate the transient "removal of container ... is already in
            # progress" race: a previous deploy's container teardown can still
            # be finishing in the daemon when this run starts. Wait for any
            # in-flight removal to settle, then retry the up a few times.
            for up in 1 2 3; do
              # Give the daemon a moment to finish any async container removal.
              sleep 5
              if docker compose up -d --build --remove-orphans; then
                break
              fi
              echo "docker compose up attempt $up failed — retrying (likely daemon teardown race)"
              sleep 10
            done

            # Wait for the API to report healthy (via traefik public path).
            echo "Waiting for API health..."
            for n in $(seq 1 24); do
              code=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" https://cortexbuildpro.com/api/health 2>/dev/null || echo 000)
              if [ "$code" = "200" ]; then
                echo "API healthy after ~$((n*5))s (HTTP 200)"
                break
              fi
              echo "  try $n: api http $code"
              sleep 5
            done
          REMOTE

      - name: Verify deployment
        run: |
          sleep 5
          echo "=== Public ==="
          curl -s -o /dev/null --max-time 20 -w "HTTPS root   -> %{http_code}\n" https://cortexbuildpro.com/
          curl -s -o /dev/null --max-time 20 -w "HTTPS health -> %{http_code}\n" https://cortexbuildpro.com/api/health
          echo "=== Health body ==="
          curl -s --max-time 10 https://cortexbuildpro.com/api/health
          echo ""
