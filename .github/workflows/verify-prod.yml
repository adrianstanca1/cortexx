name: Verify production
on:
  workflow_dispatch:
jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Capture live site state
        continue-on-error: true
        run: |
          set +e
          {
            echo "=== HTTP status per page ==="
            for path in / /dashboard /projects /tasks /team /capture /api/health /api/dashboard; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://cortexbuildpro.com$path")
              echo "$path → $CODE"
            done
            echo ""
            echo "=== /api/health body ==="
            curl -s --max-time 10 https://cortexbuildpro.com/api/health
            echo ""
            echo ""
            echo "=== /api/dashboard body (first 500 chars) ==="
            curl -s --max-time 10 https://cortexbuildpro.com/api/dashboard | head -c 500
            echo ""
            echo ""
            echo "=== /dashboard HTML title (looking for 'Cortexx' or other) ==="
            curl -sL --max-time 10 https://cortexbuildpro.com/dashboard | grep -oE "<title>[^<]+</title>" | head -1
            echo ""
            echo "=== Response headers for /api/health ==="
            curl -sI --max-time 10 https://cortexbuildpro.com/api/health
          } > verify.txt 2>&1 || true
          cat verify.txt
      - name: Commit verify results
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add verify.txt
          git commit -m "chore: verify production [skip ci]" || true
          git push || true
