name: Diagnose Site
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check site and get deployment info
        env:
          API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          echo "=== DNS ==="
          nslookup cortexbuildpro.com
          echo ""
          echo "=== HTTPS test ==="
          curl -sv --max-time 15 https://cortexbuildpro.com/ 2>&1 | head -60 || true
          echo ""
          echo "=== API /dashboard ==="
          curl -s --max-time 15 https://cortexbuildpro.com/api/dashboard 2>&1 | head -300 || true
          echo ""
          echo "=== Deployment list ==="
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"hosting_listJsDeployments","arguments":{"domain":"cortexbuildpro.com"}}}' \
            | npx hostinger-api-mcp@latest --stdio 2>/dev/null
          echo ""
          echo "=== Build logs ==="
          echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"hosting_showJsDeploymentLogs","arguments":{"domain":"cortexbuildpro.com"}}}' \
            | npx hostinger-api-mcp@latest --stdio 2>/dev/null

      - name: Save results as artifact
        if: always()
        run: |
          {
            echo "=== DNS ==="
            nslookup cortexbuildpro.com 2>/dev/null || true
            echo "=== HTTP STATUS ==="
            curl -s -o /dev/null -w "HTTP %{http_code}" --max-time 10 https://cortexbuildpro.com/ 2>/dev/null || echo "connection failed"
            echo ""
            echo "=== Root page (first 500 chars) ==="
            curl -sL --max-time 10 https://cortexbuildpro.com/ 2>/dev/null | head -c 500 || echo "no response"
            echo ""
            echo "=== /api/dashboard ==="
            curl -sL --max-time 10 https://cortexbuildpro.com/api/dashboard 2>/dev/null | head -c 500 || echo "no response"
            echo ""
            echo "=== /api/projects ==="
            curl -sL --max-time 10 https://cortexbuildpro.com/api/projects 2>/dev/null | head -c 300 || echo "no response"
            echo ""
            echo "=== Response headers for / ==="
            curl -sI --max-time 10 https://cortexbuildpro.com/ 2>/dev/null | head -20 || echo "no headers"
            echo ""
            echo "=== Hostinger deployment list ==="
            echo '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"hosting_listJsDeployments","arguments":{"domain":"cortexbuildpro.com"}}}' \
              | npx hostinger-api-mcp@latest --stdio 2>/dev/null
            echo ""
            echo "=== Hostinger build logs ==="
            echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"hosting_showJsDeploymentLogs","arguments":{"domain":"cortexbuildpro.com"}}}' \
              | npx hostinger-api-mcp@latest --stdio 2>/dev/null
          } > site_check.txt
          cat site_check.txt

      - name: Commit results back to repo
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add site_check.txt
          git commit -m "chore: diagnostic results [skip ci]" || true
          git push || true
