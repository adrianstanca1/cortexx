name: Diagnose Site
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run all diagnostics and save to file
        env:
          API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        timeout-minutes: 3
        run: |
          {
            echo "=== Deployment list ==="
            echo '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"hosting_listJsDeployments","arguments":{"domain":"cortexbuildpro.com"}}}' | timeout 25 npx hostinger-api-mcp@latest --stdio 2>/dev/null || echo "TIMED_OUT"
            echo ""
            echo "=== Build logs ==="
            echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"hosting_showJsDeploymentLogs","arguments":{"domain":"cortexbuildpro.com"}}}' | timeout 25 npx hostinger-api-mcp@latest --stdio 2>/dev/null || echo "TIMED_OUT"
            echo ""
            echo "=== Website list ==="
            echo '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"hosting_listWebsitesV1","arguments":{}}}' | timeout 25 npx hostinger-api-mcp@latest --stdio 2>/dev/null || echo "TIMED_OUT"
          } > site_check.txt
          cat site_check.txt

      - name: Commit results back to repo
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add site_check.txt
          git commit -m "chore: diagnostic results [skip ci]" || true
          git push || true
