name: Debug VPS deploy
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy

      - name: Inspect deploy state
        run: |
          {
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
              echo "=== /opt/cortexx state ==="
              ls -la /opt/cortexx/ 2>/dev/null | head -20
              echo ""
              echo "=== .env.production (masked) ==="
              if [ -f /opt/cortexx/.env.production ]; then
                grep -v PASSWORD /opt/cortexx/.env.production | sed 's|cortexx:[^@]*@|cortexx:****@|'
              else
                echo "MISSING"
              fi
              echo ""
              echo "=== Test DB connection from host ==="
              if [ -f /opt/cortexx/.env.production ]; then
                URL=$(grep DATABASE_URL /opt/cortexx/.env.production | cut -d= -f2-)
                # Test psql with timeout
                timeout 10 docker exec $(docker ps --format '{{.Names}}' | grep -i postgres | head -1) psql "$URL" -c "SELECT 1;" 2>&1 | head -5
              fi
              echo ""
              echo "=== pm2 list ==="
              pm2 list 2>&1 | head -20
              echo ""
              echo "=== pm2 logs cortexx (last 80 lines) ==="
              pm2 logs cortexx --lines 80 --nostream 2>&1 | tail -80
              echo ""
              echo "=== last build output ==="
              cat /opt/cortexx/.next/build-manifest.json 2>/dev/null | head -3 || echo "No build manifest — build never succeeded"
              echo ""
              echo "=== free memory ==="
              free -h
              echo ""
              echo "=== node/npm/pm2 versions ==="
              node -v 2>&1
              npm -v 2>&1
              pm2 -v 2>&1
          REMOTE
          } > debug.txt 2>&1
          cat debug.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add debug.txt
          git commit -m "chore: deploy debug [skip ci]" || true
          git push || true
