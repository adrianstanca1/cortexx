name: Debug nginx configs
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Show config contents
        run: |
          {
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
              for f in cortexbuild-field.conf cortexbuild-web.conf buildtrack.conf; do
                echo "=== /etc/nginx/sites-enabled/$f (first 25 lines) ==="
                head -25 "/etc/nginx/sites-enabled/$f" 2>/dev/null || echo "Not found"
                echo ""
                echo "--- server_name lines in $f ---"
                grep -n "server_name" "/etc/nginx/sites-enabled/$f" 2>/dev/null
                echo ""
              done
              echo "=== nginx active config for cortexbuildpro.com ==="
              nginx -T 2>/dev/null | awk '/server\s*{/,/^}/' | grep -B 2 -A 20 'cortexbuildpro' | head -80
          REMOTE
          } > nginx_configs.txt 2>&1
          cat nginx_configs.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add nginx_configs.txt
          git commit -m "chore: nginx configs [skip ci]" || true
          git push || true
