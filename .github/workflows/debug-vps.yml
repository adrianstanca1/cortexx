name: Debug VPS state
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy

      - name: Inspect VPS contents
        run: |
          {
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE_SCRIPT'
              echo "=== OS ==="
              cat /etc/os-release | head -3
              echo ""
              echo "=== What's running ==="
              ss -tlnp 2>/dev/null | head -20 || netstat -tlnp 2>/dev/null | head -20
              echo ""
              echo "=== Docker containers ==="
              docker ps 2>/dev/null | head -20 || echo "No docker"
              echo ""
              echo "=== Existing installs ==="
              for cmd in node npm psql nginx pm2 git docker; do
                if command -v $cmd >/dev/null 2>&1; then
                  echo "$cmd: $(command -v $cmd) | $($cmd --version 2>&1 | head -1)"
                else
                  echo "$cmd: NOT installed"
                fi
              done
              echo ""
              echo "=== Web roots / nginx sites ==="
              ls -la /etc/nginx/sites-enabled/ 2>/dev/null | head -10
              ls /var/www/ 2>/dev/null
              echo ""
              echo "=== Coolify / current app ==="
              ls /opt/ 2>/dev/null | head -10
              systemctl list-units --type=service --state=running 2>/dev/null | grep -iE "coolify|app|cortex|node" | head -10
              echo ""
              echo "=== Disk free ==="
              df -h / 2>/dev/null
              echo ""
              echo "=== Last apt errors ==="
              tail -20 /var/log/apt/term.log 2>/dev/null || echo "No apt log"
          REMOTE_SCRIPT
          } > vps_state.txt 2>&1
          cat vps_state.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add vps_state.txt
          git commit -m "chore: vps state inspection [skip ci]" || true
          git push || true
