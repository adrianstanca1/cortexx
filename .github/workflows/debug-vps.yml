name: Debug VPS
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Inspect deploy state
        run: |
          {
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
              echo "=== /opt/cortexx state ==="
              ls -la /opt/cortexx/ 2>/dev/null | head -20
              echo ""
              echo "=== .env.production (sanitized) ==="
              if [ -f /opt/cortexx/.env.production ]; then
                grep -v PASSWORD /opt/cortexx/.env.production | sed -E 's/(SECRET|TOKEN|PASS|PASSWORD)=.*$/\1=***/' | sed -E 's/cortexx:[^@]*@/cortexx:***@/'
              else
                echo "MISSING"
              fi
              echo ""
              echo "=== Latest npm error log (if any) ==="
              find /root/.npm/_logs -name "*.log" -mmin -120 -exec ls -la {} \; 2>/dev/null | tail -3
              echo ""
              latest=$(find /root/.npm/_logs -name "*.log" -mmin -120 2>/dev/null | sort | tail -1)
              if [ -n "$latest" ]; then
                echo "Tail of $latest:"
                tail -40 "$latest"
              fi
              echo ""
              echo "=== Build state ==="
              ls /opt/cortexx/.next 2>/dev/null | head -5 || echo "no .next"
              echo ""
              echo "=== pm2 status ==="
              pm2 list 2>&1 | grep -E "cortexx|status"
              pm2 logs cortexx --lines 50 --nostream 2>&1 | tail -50
              echo ""
              echo "=== Database state ==="
              PG_CONTAINER=""
              for c in $(docker ps --format '{{.Names}}'); do
                if docker port "$c" 2>/dev/null | grep -qE '5432/tcp -> (0\.0\.0\.0|::):5432'; then
                  PG_CONTAINER="$c"; break
                fi
              done
              echo "PG container: $PG_CONTAINER"
              if [ -n "$PG_CONTAINER" ]; then
                docker exec -i "$PG_CONTAINER" psql -U postgres -d cortexx -c "\dt" 2>&1 | head -20
                echo ""
                docker exec -i "$PG_CONTAINER" psql -U postgres -d cortexx -c 'SELECT COUNT(*) FROM "Project";' 2>&1 | head -5
              fi
          REMOTE
          } > vps_debug.txt 2>&1
          cat vps_debug.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add vps_debug.txt
          git commit -m "chore: vps debug [skip ci]" || true
          git push || true
