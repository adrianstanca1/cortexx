name: Debug VPS nginx
on:
  workflow_dispatch:
jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Inspect nginx routing for cortexbuildpro.com
        run: |
          {
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' << 'REMOTE'
              echo "=== sites-enabled (active) ==="
              ls -la /etc/nginx/sites-enabled/
              echo ""
              echo "=== All configs that mention cortexbuildpro ==="
              grep -lr "cortexbuildpro" /etc/nginx/sites-available/ /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | sort -u
              echo ""
              echo "=== nginx -T | grep cortexbuildpro and server_name ==="
              nginx -T 2>/dev/null | grep -E "server_name|cortexbuildpro|listen" | head -30
              echo ""
              echo "=== Test localhost:3010 (our Next.js app) ==="
              curl -s -o /dev/null -w "  / → %{http_code}\n" http://localhost:3010/
              curl -s -o /dev/null -w "  /api/health → %{http_code}\n" http://localhost:3010/api/health
              curl -s --max-time 5 http://localhost:3010/api/health | head -c 200
              echo ""
              echo ""
              echo "=== Test what nginx routes cortexbuildpro.com to ==="
              curl -s -H "Host: cortexbuildpro.com" -o /dev/null -w "  port 80: %{http_code}\n" http://localhost/
              curl -s -k -H "Host: cortexbuildpro.com" -o /dev/null -w "  port 443: %{http_code}\n" https://localhost/
              curl -s -k -H "Host: cortexbuildpro.com" --max-time 5 https://localhost/api/health | head -c 200
              echo ""
              echo ""
              echo "=== pm2 list ==="
              pm2 list 2>&1 | grep -E "cortexx|cortexbuild-web"
              echo ""
              echo "=== /etc/nginx/sites-available/cortexx (our config) ==="
              head -40 /etc/nginx/sites-available/cortexx 2>/dev/null || echo "MISSING"
          REMOTE
          } > nginx_debug.txt 2>&1
          cat nginx_debug.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add nginx_debug.txt
          git commit -m "chore: nginx debug [skip ci]" || true
          git push || true
