name: Redeploy with full logs
on:
  workflow_dispatch:
jobs:
  redeploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify token first
        env:
          API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          echo "Token length: ${#API_TOKEN}"
          echo "Token prefix: ${API_TOKEN:0:5}..."
          echo ""
          echo "=== Try direct API call ==="
          curl -sv -H "Authorization: Bearer $API_TOKEN" \
            https://developers.hostinger.com/api/hosting/v1/websites 2>&1 | head -40 || true

      - name: Inspect Hostinger account
        if: always()
        env:
          API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          {
            echo "=== Hosting orders ==="
            curl -s -H "Authorization: Bearer $API_TOKEN" "https://developers.hostinger.com/api/hosting/v1/orders" 2>&1
            echo ""
            echo "=== Domain list ==="
            curl -s -H "Authorization: Bearer $API_TOKEN" "https://developers.hostinger.com/api/domains/v1/portfolio" 2>&1
            echo ""
            echo "=== VPS list ==="
            curl -s -H "Authorization: Bearer $API_TOKEN" "https://developers.hostinger.com/api/vps/v1/virtual-machines" 2>&1
            echo ""
            echo "=== Subscriptions ==="
            curl -s -H "Authorization: Bearer $API_TOKEN" "https://developers.hostinger.com/api/billing/v1/subscriptions" 2>&1
            echo ""
            echo "=== Datacenters ==="
            curl -s -H "Authorization: Bearer $API_TOKEN" "https://developers.hostinger.com/api/hosting/v1/datacenters" 2>&1
          } > diag.txt
          cat diag.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add diag.txt
          git commit -m "chore: account inspect results [skip ci]" || true
          git push || true
