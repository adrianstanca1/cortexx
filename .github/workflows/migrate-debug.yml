name: Migrate Debug (manual)

# Workflow_dispatch — clear stuck migrations, then attempt prisma
# migrate deploy on the VPS and capture the FULL output to the repo
# so we can see the actual SQL error.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy

      - name: Clear + run migration with verbose capture
        run: |
          cat > /tmp/mig.sh << 'SCRIPT'
          set +e
          echo "=== Clearing stuck _prisma_migrations rows ==="
          sudo -u postgres psql cortexx -c "DELETE FROM _prisma_migrations WHERE finished_at IS NULL"
          echo
          echo "=== State BEFORE migrate ==="
          sudo -u postgres psql cortexx -c "SELECT migration_name, finished_at IS NOT NULL AS done FROM _prisma_migrations ORDER BY started_at DESC LIMIT 8"
          echo
          echo "=== Sync repo ==="
          cd /opt/cortexx
          git fetch origin main
          git reset --hard origin/main
          git log --oneline -1
          echo
          echo "=== prisma migrate deploy ==="
          DB_PASS=$(grep -oP 'DATABASE_URL=postgresql://cortexx:\K[^@]+' /opt/cortexx/.env.production)
          export DATABASE_URL="postgresql://cortexx:$DB_PASS@127.0.0.1:5432/cortexx"
          cd /opt/cortexx
          # Ensure node_modules + prisma generate
          if [ ! -d node_modules ]; then npm ci --include=dev 2>&1 | tail -5; fi
          npx prisma generate 2>&1 | tail -5
          echo
          echo "----- migrate deploy output START -----"
          npx prisma migrate deploy 2>&1
          MIG_EXIT=$?
          echo "----- migrate deploy output END (exit=$MIG_EXIT) -----"
          echo
          echo "=== State AFTER migrate ==="
          sudo -u postgres psql cortexx -c "SELECT migration_name, started_at, finished_at FROM _prisma_migrations ORDER BY started_at DESC LIMIT 5"
          echo
          echo "=== Project.organizationId after attempt? ==="
          sudo -u postgres psql cortexx -tAc "SELECT column_name FROM information_schema.columns WHERE table_name = 'Project' AND column_name = 'organizationId'"
          SCRIPT

          scp -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy /tmp/mig.sh root@72.62.132.43:/tmp/mig.sh
          OUT=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=30 -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash /tmp/mig.sh' 2>&1 || true)

          echo "$OUT" > /tmp/migrate-out.txt
          wc -l /tmp/migrate-out.txt

      # The migrate output can include DATABASE_URL/connection strings on
      # failure, so it must NEVER be committed to a branch. Upload it as a
      # private run artifact instead (downloadable from the run, not the repo).
      - name: Upload migrate log (private to this run)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: migrate-debug
          path: /tmp/migrate-out.txt
          if-no-files-found: ignore
          retention-days: 7
