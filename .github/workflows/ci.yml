name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Prisma schema format check
        run: npx prisma format --check
      - name: Application route, link, and UI integrity
        run: npm run audit:app
      - name: Lint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: dist/ integrity gate (no server .ts/.jsx shipped, no drift)
        # Enforces the security invariant that server-only .ts/.jsx never ship
        # to dist/ (which is served live at cortexbuildpro.com), and that dist/
        # matches lib/. `postinstall` masks precompile failures locally with
        # `|| true`; this step makes a broken builder fail CI instead of
        # silently publishing stale or over-broad dist/ to production.
        run: npm run precompile:check
      - name: Unit tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee unit-tests.log
      - name: Upload unit-test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: unit-tests.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Build
        env:
          NEXTAUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

  typecheck-apps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Typecheck shared core (@cortexbuild/core)
        working-directory: packages/core
        run: ../../node_modules/.bin/tsc --noEmit -p tsconfig.json
      - name: Typecheck Expo app (React Native)
        working-directory: expo
        run: npm ci && npm run typecheck

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Security audit (high+)
        run: npm audit --audit-level=high --omit=dev || echo "::warning::Audit found high-severity production dependency issues"

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cortexx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/cortexx_test
      DATABASE_URL: postgresql://postgres:test@localhost:5432/cortexx_test
      MULTITENANT_ENFORCED: 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations to test DB
        run: npx prisma migrate deploy
      - name: Run integration suite
        run: npm run test:integration

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cortexx_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/cortexx_e2e
      NEXTAUTH_URL: http://127.0.0.1:3000
      AUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-playwright-secret-not-used-outside-ci
      AUTH_SECRET: ci-playwright-secret-not-used-outside-ci
      ADMIN_EMAIL: admin@cortexbuildpro.com
      ADMIN_PASSWORD: changeme-please-1234
      E2E_ADMIN_EMAIL: admin@cortexbuildpro.com
      E2E_ADMIN_PASSWORD: changeme-please-1234
      DEFAULT_ORG_SLUG: cortexbuildpro
      DEFAULT_ORG_NAME: Cortexbuild Pro
      MULTITENANT_ENFORCED: 'true'
      DEBUG: pw:webserver
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Seed deterministic organisation and admin account
        run: npx tsx scripts/seed-e2e.ts
      - name: Install Playwright and Chromium
        run: npm run e2e:install
      - name: Run desktop and mobile browser journeys
        shell: bash
        run: |
          set -o pipefail
          npm run e2e 2>&1 | tee playwright-e2e.log
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/playwright/
            playwright-e2e.log
          if-no-files-found: ignore
          retention-days: 14
