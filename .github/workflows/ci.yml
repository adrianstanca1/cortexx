name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          # Invalidate when package-lock or source changes; restore-keys
          # lets us reuse the most recent cache even with source changes
          # so we still benefit from incremental compile.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Prisma schema format check
        run: npx prisma format --check
      - name: Lint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          NEXTAUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Security audit (high+)
        run: npm audit --audit-level=high --production || echo "::warning::Audit found high-severity issues"

  integration-tests:
    # Cross-org isolation tests against a real Postgres. The keystone
    # safety check before MULTITENANT_ENFORCED=true can flip in
    # production — without this green, every owned-model query is on
    # the trust system.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cortexx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/cortexx_test
      DATABASE_URL: postgresql://postgres:test@localhost:5432/cortexx_test
      MULTITENANT_ENFORCED: 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations to test DB
        run: npx prisma migrate deploy
      - name: Run integration suite
        run: npm run test:integration
