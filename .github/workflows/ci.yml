name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Prisma schema format check
        run: npx prisma format --check
      - name: Lint
        run: npm run lint
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Build
        env:
          NEXTAUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Security audit (high+)
        run: npm audit --audit-level=high --omit=dev || echo "::warning::Audit found high-severity production dependency issues"

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cortexx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:test@localhost:5432/cortexx_test
      DATABASE_URL: postgresql://postgres:test@localhost:5432/cortexx_test
      MULTITENANT_ENFORCED: 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations to test DB
        run: npx prisma migrate deploy
      - name: Run integration suite
        run: npm run test:integration
