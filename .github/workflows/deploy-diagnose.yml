name: Deploy Diagnose (manual)

# Workflow_dispatch-only diagnostic. SSHes to the VPS, runs the first
# part of the deploy script (DB setup + git fetch) verbatim, captures
# every command's output to $GITHUB_STEP_SUMMARY so it surfaces in the
# workflow's annotation view (accessible without log download).

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy

      - name: Run diagnostic
        run: |
          # Write the remote script to a file (no heredoc indentation traps)
          cat > /tmp/diag.sh << 'SCRIPT'
          set +e
          echo "=== uptime ==="
          uptime
          echo
          echo "=== disk free ==="
          df -h /opt /var/lib/postgresql 2>/dev/null
          echo
          echo "=== memory ==="
          free -h
          echo
          echo "=== postgres service ==="
          systemctl is-active postgresql && echo OK || echo FAILED
          echo
          echo "=== postgres active queries on cortexx ==="
          sudo -u postgres psql -tAc "SELECT pid, state, query_start, LEFT(query, 100) FROM pg_stat_activity WHERE datname = 'cortexx' AND state != 'idle'" 2>&1 | head -20
          echo
          echo "=== _prisma_migrations ==="
          sudo -u postgres psql cortexx -c "SELECT migration_name, started_at, finished_at, rolled_back_at FROM _prisma_migrations ORDER BY started_at DESC LIMIT 15" 2>&1 | head -40
          echo
          echo "=== table count ==="
          sudo -u postgres psql cortexx -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'" 2>&1
          echo
          echo "=== Organization rows ==="
          sudo -u postgres psql cortexx -c "SELECT id, slug, name, plan FROM \"Organization\" LIMIT 5" 2>&1
          echo
          echo "=== Project.organizationId present? ==="
          sudo -u postgres psql cortexx -tAc "SELECT column_name, is_nullable FROM information_schema.columns WHERE table_name = 'Project' AND column_name = 'organizationId'" 2>&1
          echo
          echo "=== pg_dump --schema-only line count ==="
          time sudo -u postgres pg_dump cortexx --schema-only 2>&1 | wc -l
          echo
          echo "=== git ==="
          cd /opt/cortexx && git log --oneline -3 2>&1
          echo
          echo "=== node version ==="
          node -v
          echo
          echo "=== pm2 ==="
          pm2 list 2>&1 | head -20
          SCRIPT

          # Copy + execute on VPS, capture output
          scp -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy /tmp/diag.sh root@72.62.132.43:/tmp/diag.sh
          OUT=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash /tmp/diag.sh' 2>&1 || true)

          {
            echo "## VPS Deploy Diagnostic"
            echo ""
            echo '```'
            echo "$OUT"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

          # Also surface as job log (echo) so it's readable via the API.
          echo "===== DIAGNOSTIC OUTPUT START ====="
          echo "$OUT"
          echo "===== DIAGNOSTIC OUTPUT END ====="

          # And save as an artifact for download.
          mkdir -p /tmp/diag-out
          echo "$OUT" > /tmp/diag-out/diagnostic.txt

      - name: Upload diagnostic as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vps-diagnostic
          path: /tmp/diag-out/diagnostic.txt

      - name: Commit diagnostic to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE_SHA=$(gh api "repos/${{ github.repository }}/git/refs/heads/main" -q '.object.sha')
          BLOB_SHA=$(jq -Rsn --rawfile content /tmp/diag-out/diagnostic.txt '{content: $content, encoding: "utf-8"}' | gh api --method POST "repos/${{ github.repository }}/git/blobs" --input - -q '.sha')
          TREE_SHA=$(jq -n --arg base "$BASE_SHA" --arg blob "$BLOB_SHA" '{base_tree: $base, tree: [{path: "ops/last-diagnostic.txt", mode: "100644", type: "blob", sha: $blob}]}' | gh api --method POST "repos/${{ github.repository }}/git/trees" --input - -q '.sha')
          COMMIT_SHA=$(jq -n --arg tree "$TREE_SHA" --arg parent "$BASE_SHA" '{message: "ops: latest deploy diagnostic [skip ci]", tree: $tree, parents: [$parent]}' | gh api --method POST "repos/${{ github.repository }}/git/commits" --input - -q '.sha')
          gh api --method PATCH "repos/${{ github.repository }}/git/refs/heads/main" -f sha="$COMMIT_SHA"
          echo "✓ Committed diagnostic: $COMMIT_SHA"
