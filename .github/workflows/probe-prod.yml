name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Inventory
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' > probe.txt 2>&1 << 'REMOTE'
            echo "=== docker dirs ==="
            ls -la /var/lib/docker 2>&1 | head -5
            echo
            echo "=== postgresql ==="
            ls -la /var/lib/postgresql 2>&1 | head -5
            which psql
            psql --version 2>&1 | head -1
            echo
            echo "=== port 5432 listener ==="
            ss -ltn 2>/dev/null | grep 5432
            echo
            echo "=== services ==="
            systemctl list-units --type=service --state=running 2>&1 | grep -iE "postgres|nginx" | head
            echo
            echo "=== pm2 ==="
            which pm2 && pm2 list 2>&1 | head -20
            echo
            echo "=== node ==="
            which node && node --version
            echo
            echo "=== /opt ==="
            ls -la /opt/ 2>&1 | head
          REMOTE
          cat probe.txt
      - name: Commit
        if: always()
        run: |
          git config user.name probe-bot
          git config user.email probe@cortexx.local
          git add probe.txt
          git commit -m "inventory [skip ci]" || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 | tail -1
            git push origin main 2>&1 | tail -1 && break
            sleep $((i * 2))
          done
