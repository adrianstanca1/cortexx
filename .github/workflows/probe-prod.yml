name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Resync DB password + restart
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SEED_TOKEN: ${{ secrets.SEED_TOKEN }}
        run: |
          NEW_PASS=$(openssl rand -hex 16)
          echo "::add-mask::$NEW_PASS"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 \
            NEW_PASS="$NEW_PASS" \
            NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
            ADMIN_EMAIL="$ADMIN_EMAIL" \
            ADMIN_PASSWORD="$ADMIN_PASSWORD" \
            SEED_TOKEN="$SEED_TOKEN" \
            'bash -s' > probe-fix.txt 2>&1 << 'REMOTE'
            set -uo pipefail
            APP_DIR=/opt/cortexx
            APP_PORT=3010

            PG_CONTAINER=""
            for c in $(docker ps --format '{{.Names}}'); do
              if docker port "$c" 2>/dev/null | grep -qE '5432/tcp -> (0\.0\.0\.0|::):5432'; then
                PG_CONTAINER="$c"; break
              fi
            done
            PG_IP=$(docker inspect "$PG_CONTAINER" --format '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}' | awk '{print $1}')
            echo "Container=$PG_CONTAINER IP=$PG_IP"

            PG_SUPER=$(docker inspect "$PG_CONTAINER" --format '{{range .Config.Env}}{{println .}}{{end}}' | grep ^POSTGRES_USER= | cut -d= -f2 || true)
            PG_SUPER=${PG_SUPER:-postgres}
            echo "PG_SUPER=$PG_SUPER"

            ALTER_OUT=$(docker exec -i "$PG_CONTAINER" psql -U "$PG_SUPER" -c "ALTER USER cortexx WITH PASSWORD '$NEW_PASS';" 2>&1)
            echo "ALTER: $ALTER_OUT"

            VERIFY=$(docker exec -i "$PG_CONTAINER" psql "postgresql://cortexx:$NEW_PASS@$PG_IP:5432/cortexx" -tAc "SELECT 1" 2>&1)
            echo "Auth verify: $VERIFY"

            cat > $APP_DIR/.env.production << ENV
          DATABASE_URL=postgresql://cortexx:$NEW_PASS@$PG_IP:5432/cortexx
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=https://cortexbuildpro.com
          NODE_ENV=production
          PORT=$APP_PORT
          ALLOW_SEED=true
          SEED_TOKEN=$SEED_TOKEN
          ADMIN_EMAIL=$ADMIN_EMAIL
          ADMIN_PASSWORD=$ADMIN_PASSWORD
          ENV
            chmod 600 $APP_DIR/.env.production
            echo ".env rewritten"

            pm2 delete cortexx 2>&1 | head -2
            cd $APP_DIR
            PORT=$APP_PORT pm2 start npm --name cortexx -- start 2>&1 | head -3
            sleep 7
            pm2 save 2>&1 | head -3

            echo
            echo "=== /api/health ==="
            curl -s http://localhost:3010/api/health
          REMOTE
          cat probe-fix.txt
      - name: Commit
        run: |
          git config user.name "probe-bot"
          git config user.email "probe@cortexx.local"
          git add probe-fix.txt
          git commit -m "DB resync [skip ci]" || true
          git pull --rebase origin main
          git push
