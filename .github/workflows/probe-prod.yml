name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Inspect
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' > probe.txt 2>&1 << 'REMOTE'
            echo "=== /opt/cortexx state ==="
            ls -la /opt/ 2>&1 | grep -i cortex
            echo
            echo "=== git state ==="
            cd /opt/cortexx 2>/dev/null && git log --oneline -3 && git remote -v 2>&1 | head -2 || echo "NO REPO"
            echo
            echo "=== build log tail ==="
            tail -20 /tmp/cortexx-build.log 2>/dev/null
            echo
            echo "=== npm-ci tail ==="
            tail -15 /tmp/cortexx-npm-ci.log 2>/dev/null
            echo
            echo "=== prisma-mig tail ==="
            tail -10 /tmp/cortexx-prisma-mig.log 2>/dev/null
          REMOTE
          cat probe.txt
      - name: Commit
        if: always()
        run: |
          git config user.name probe-bot
          git config user.email probe@cortexx.local
          git add probe.txt
          git commit -m "probe [skip ci]" || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 | tail -1
            git push origin main 2>&1 | tail -1 && break
            sleep $((i * 2))
          done
