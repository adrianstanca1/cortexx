name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Inspect .env + DB
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' > probe-env.txt 2>&1 << 'REMOTE'
            echo "=== .env.production (masked passwords) ==="
            sed 's/PASSWORD=.*/PASSWORD=<masked>/; s/SECRET=.*/SECRET=<masked>/; s/SEED_TOKEN=.*/SEED_TOKEN=<masked>/' /opt/cortexx/.env.production 2>&1
            echo
            echo "=== leading bytes (hex) of DATABASE_URL line ==="
            grep DATABASE_URL /opt/cortexx/.env.production | head -c 200 | xxd
            echo
            echo "=== curl localhost:3010/api/health ==="
            curl -s http://localhost:3010/api/health
            echo
            echo "=== pm2 cortexx logs (last 40) ==="
            pm2 logs cortexx --lines 40 --nostream 2>&1 | tail -50
          REMOTE
          cat probe-env.txt
      - name: Commit
        run: |
          git config user.name "probe-bot"
          git config user.email "probe@cortexx.local"
          git add probe-env.txt
          git commit -m "probe-env [skip ci]" || true
          git pull --rebase origin main
          git push
