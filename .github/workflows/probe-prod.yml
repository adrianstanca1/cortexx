name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: External smoke test
        run: |
          {
            echo "=== /login ==="
            curl -sI https://cortexbuildpro.com/login | head -3
            echo
            echo "=== /api/health ==="
            curl -s https://cortexbuildpro.com/api/health | python3 -m json.tool | head -15
            echo
            echo "=== /sw.js ==="
            curl -sI https://cortexbuildpro.com/sw.js | head -3
            echo
            echo "=== /manifest.json ==="
            curl -s https://cortexbuildpro.com/manifest.json | python3 -m json.tool | head -10
            echo
            echo "=== build id ==="
            curl -sL -A "Mozilla/5.0" https://cortexbuildpro.com/login | grep -oE '"buildId":"[^"]*"' | head -1
          } > probe-final.txt 2>&1
          cat probe-final.txt
      - name: Commit
        run: |
          git config user.name "probe-bot"
          git config user.email "probe@cortexx.local"
          git add probe-final.txt
          git commit -m "external final probe [skip ci]" || true
          git pull --rebase origin main
          git push
