name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Probe production
        run: |
          {
            echo '# Production probe'
            echo "Probed at: $(date -u +%FT%TZ)"
            echo
            echo '## /login HEAD'
            curl -sI https://cortexbuildpro.com/login | head -10
            echo
            echo '## /sw.js (first 30 lines)'
            curl -s https://cortexbuildpro.com/sw.js | head -30
            echo
            echo '## /manifest.json'
            curl -s https://cortexbuildpro.com/manifest.json
            echo
            echo
            echo '## /login HTML — chunks referenced'
            curl -sL -A "Mozilla/5.0" https://cortexbuildpro.com/login | grep -oE '/_next/static/chunks/[a-zA-Z0-9_/-]*\.js' | sort -u | head -15
            echo
            echo '## build id'
            curl -sL -A "Mozilla/5.0" https://cortexbuildpro.com/login | grep -oE '"buildId":"[^"]*"' | head -3
            echo
            echo '## QuickActions text presence on /login page'
            curl -sL -A "Mozilla/5.0" https://cortexbuildpro.com/login | grep -c "Quick actions" || true
          } > probe-result.txt
      - name: Commit + push
        run: |
          git config user.name "probe-bot"
          git config user.email "probe@cortexx.local"
          git add probe-result.txt
          git commit -m "probe-prod: result [skip ci]" || echo "nothing to commit"
          git push
