name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Test authed clone
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GH_PAT on runner: len=${#GH_PAT}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 \
            GH_PAT="$GH_PAT" 'bash -s' > probe.txt 2>&1 << 'REMOTE'
            echo "GH_PAT len on VPS: ${#GH_PAT}"
            echo "first 8: ${GH_PAT:0:8}..."
            cd /tmp && rm -rf cortexx-test
            git clone "https://x-access-token:${GH_PAT}@github.com/adrianstanca1/cortexx.git" cortexx-test 2>&1 | tail -8
            echo "clone exit: $?"
            ls cortexx-test 2>&1 | head -5
            rm -rf cortexx-test
          REMOTE
          cat probe.txt
      - name: Commit
        if: always()
        run: |
          git config user.name probe-bot
          git config user.email probe@cortexx.local
          git add probe.txt
          git commit -m "probe authed clone [skip ci]" || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 | tail -1
            git push origin main 2>&1 | tail -1 && break
            sleep $((i * 2))
          done
