name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Fix DB
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SEED_TOKEN: ${{ secrets.SEED_TOKEN }}
        run: |
          NEW_PASS=$(openssl rand -hex 16)
          echo "::add-mask::$NEW_PASS"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 \
            NEW_PASS="$NEW_PASS" \
            NEXTAUTH_SECRET="$NEXTAUTH_SECRET" \
            ADMIN_EMAIL="$ADMIN_EMAIL" \
            ADMIN_PASSWORD="$ADMIN_PASSWORD" \
            SEED_TOKEN="$SEED_TOKEN" \
            'bash -s' > probe-fix.txt 2>&1 << 'REMOTE'
          APP_DIR=/opt/cortexx
          APP_PORT=3010
          PG_CONTAINER="cortexbuild-db"
          PG_IP=$(docker inspect "$PG_CONTAINER" --format '{{range .NetworkSettings.Networks}}{{.IPAddress}} {{end}}' | awk '{print $1}')
          echo "PG_IP=$PG_IP"

          # NOTE: drop -i, use < /dev/null to avoid sharing SSH stdin
          ALTER=$(docker exec "$PG_CONTAINER" psql -U cortexbuild -c "ALTER USER cortexx WITH PASSWORD '$NEW_PASS';" < /dev/null 2>&1)
          echo "ALTER exit=$?: $ALTER"

          VERIFY=$(docker exec "$PG_CONTAINER" psql "postgresql://cortexx:$NEW_PASS@$PG_IP:5432/cortexx" -tAc "SELECT 1" < /dev/null 2>&1)
          echo "VERIFY exit=$?: $VERIFY"

          if echo "$VERIFY" | grep -qE '^[[:space:]]*1[[:space:]]*$'; then
            cat > $APP_DIR/.env.production << ENV
          DATABASE_URL=postgresql://cortexx:$NEW_PASS@$PG_IP:5432/cortexx
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=https://cortexbuildpro.com
          NODE_ENV=production
          PORT=$APP_PORT
          ALLOW_SEED=true
          SEED_TOKEN=$SEED_TOKEN
          ADMIN_EMAIL=$ADMIN_EMAIL
          ADMIN_PASSWORD=$ADMIN_PASSWORD
          ENV
            chmod 600 $APP_DIR/.env.production
            echo ".env written ($(wc -c < $APP_DIR/.env.production) bytes)"
            pm2 delete cortexx 2>&1 | head -1
            cd $APP_DIR
            PORT=$APP_PORT pm2 start npm --name cortexx -- start 2>&1 | head -3
            sleep 8
            pm2 save 2>&1 | head -1
            echo "=== HEALTH ==="
            curl -s http://localhost:3010/api/health
            echo
            echo "=== test login API ==="
            curl -s -o /dev/null -w "/api/auth/csrf → %{http_code}\n" http://localhost:3010/api/auth/csrf
          else
            echo "DB AUTH FAILED"
          fi
          REMOTE
          cat probe-fix.txt
      - name: Commit
        if: always()
        run: |
          git config user.name "probe-bot"
          git config user.email "probe@cortexx.local"
          git add probe-fix.txt
          git commit -m "DB resync result [skip ci]" || true
          git pull --rebase origin main
          git push
