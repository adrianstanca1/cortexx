name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and report
        run: |
          {
            echo '## Production probe'
            echo
            echo '### Login page HEAD'
            curl -sI https://cortexbuildpro.com/login | head -10 | sed 's/^/    /'
            echo
            echo '### Build IDs from login HTML'
            curl -sL -A "Mozilla/5.0" https://cortexbuildpro.com/login | grep -oE '"buildId":"[^"]*"' | head -5 | sed 's/^/    /'
            echo
            echo '### Service worker'
            curl -s https://cortexbuildpro.com/sw.js | head -5 | sed 's/^/    /'
            echo
            echo '### Manifest'
            curl -s https://cortexbuildpro.com/manifest.json | head -3 | sed 's/^/    /'
            echo
            echo '### /_next/static chunks referenced in /login HTML'
            curl -sL -A "Mozilla/5.0" https://cortexbuildpro.com/login | grep -oE '/_next/static/chunks/[a-zA-Z0-9_-]*\.js' | sort -u | head -10 | sed 's/^/    /'
          } >> $GITHUB_STEP_SUMMARY
