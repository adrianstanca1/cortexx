name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Find docker
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' > probe.txt 2>&1 << 'REMOTE'
            echo "=== PATH ==="
            echo "$PATH"
            echo
            echo "=== which docker (login shell) ==="
            bash -lc 'which docker; type docker; docker --version' 2>&1 | head -5
            echo
            echo "=== find /usr* /opt -name docker ==="
            find /usr /opt /snap -maxdepth 4 -name docker -type f 2>/dev/null | head -10
            find /usr /opt /snap -maxdepth 4 -name docker -type l 2>/dev/null | head -10
            echo
            echo "=== systemctl status ==="
            systemctl is-active docker 2>&1
            systemctl is-enabled docker 2>&1
            echo
            echo "=== dpkg --list docker* ==="
            dpkg --list 2>/dev/null | grep -i docker | head -10
            echo
            echo "=== running containers (try via socket if exec works) ==="
            ls /var/run/docker.sock 2>&1
          REMOTE
          cat probe.txt
      - name: Commit
        if: always()
        run: |
          git config user.name probe-bot
          git config user.email probe@cortexx.local
          git add probe.txt
          git commit -m "find docker [skip ci]" || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 | tail -1
            git push origin main 2>&1 | tail -1 && break
            sleep $((i * 2))
          done
