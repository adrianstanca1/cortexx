name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: External HTTP probe
        run: |
          {
            echo "Probed at: $(date -u)"
            echo
            echo '=== /login HEAD ==='
            curl -sI https://cortexbuildpro.com/login | head -8
            echo
            echo '=== /dashboard HEAD ==='
            curl -sI https://cortexbuildpro.com/dashboard | head -8
            echo
            echo '=== /sw.js HEAD ==='
            curl -sI https://cortexbuildpro.com/sw.js | head -5
            echo
            echo '=== /sw.js first 3 lines ==='
            curl -s https://cortexbuildpro.com/sw.js | head -3
            echo
            echo '=== /manifest.json (parsed) ==='
            curl -s https://cortexbuildpro.com/manifest.json | python3 -m json.tool 2>&1 | head -20
            echo
            echo '=== /api/health ==='
            curl -s https://cortexbuildpro.com/api/health | python3 -m json.tool 2>&1 | head -25
            echo
            echo '=== /login HTML build id ==='
            curl -sL -A "Mozilla/5.0" https://cortexbuildpro.com/login | grep -oE '"buildId":"[^"]*"' | head -2
            echo
            echo '=== /dashboard HTML build id (follows redirect to /login) ==='
            curl -sL -A "Mozilla/5.0" https://cortexbuildpro.com/dashboard | grep -oE '"buildId":"[^"]*"' | head -2
          } > probe-result.txt 2>&1
          cat probe-result.txt
      - name: Commit
        run: |
          git config user.name "probe-bot"
          git config user.email "probe@cortexx.local"
          git add probe-result.txt
          git commit -m "external probe [skip ci]" || true
          git pull --rebase origin main 2>&1 | tail -2
          git push
