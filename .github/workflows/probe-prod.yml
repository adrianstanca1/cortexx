name: Probe production
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/cortexx_deploy
          chmod 600 ~/.ssh/cortexx_deploy
      - name: Inspect last deploy state
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/cortexx_deploy root@72.62.132.43 'bash -s' > probe-deploy.txt 2>&1 << 'REMOTE'
            echo "=== git HEAD ==="
            cd /opt/cortexx && git log --oneline -3
            echo
            echo "=== build log tail ==="
            tail -30 /tmp/cortexx-build.log 2>/dev/null
            echo
            echo "=== npm-ci log tail ==="
            tail -20 /tmp/cortexx-npm-ci.log 2>/dev/null
            echo
            echo "=== prisma-mig log tail ==="
            tail -10 /tmp/cortexx-prisma-mig.log 2>/dev/null
            echo
            echo "=== seed log tail ==="
            tail -10 /tmp/cortexx-seed.log 2>/dev/null
            echo
            echo "=== pm2 status ==="
            pm2 list 2>&1 | grep cortexx
            echo
            echo "=== /api/health ==="
            curl -s --max-time 5 http://localhost:3010/api/health | head -c 500
          REMOTE
          cat probe-deploy.txt
      - name: Commit
        if: always()
        run: |
          git config user.name probe-bot
          git config user.email probe@cortexx.local
          git add probe-deploy.txt
          git commit -m "probe: deploy state [skip ci]" || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 | tail -2
            git push origin main 2>&1 | tail -1 && break
            sleep $((i * 2))
          done
