name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create deployment archive
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "node_modules/*" \
            --exclude ".next/*" \
            --exclude "deploy.zip"
          echo "Archive size: $(du -sh deploy.zip)"

      - name: Deploy to Hostinger
        env:
          API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          npx hostinger-api-mcp@latest --stdio <<'EOF'
          {"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"hosting_deployJsApplication","arguments":{"domain":"cortexbuildpro.com","archivePath":"./deploy.zip","removeArchive":true}}}
          EOF

      - name: Check deployment status
        env:
          API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
        run: |
          sleep 10
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"hosting_listJsDeployments","arguments":{"domain":"cortexbuildpro.com"}}}' \
            | API_TOKEN=$API_TOKEN npx hostinger-api-mcp@latest --stdio
