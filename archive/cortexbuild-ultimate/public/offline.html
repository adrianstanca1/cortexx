<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CortexBuild — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #f1f5f9; font-family: system-ui, sans-serif;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; padding: 1.5rem; }
    .card { background: #1e293b; border-radius: 1.5rem; padding: 2rem; max-width: 360px;
            width: 100%; text-align: center; border: 1px solid #334155; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn { display: block; background: #1e40af; color: #bfdbfe; border-radius: 0.75rem;
           padding: 0.75rem 1.5rem; font-weight: 600; text-decoration: none;
           font-size: 0.875rem; margin: 0 auto; border: none; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>No connection — your work is saved and will sync automatically when you reconnect.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
