# Minimal local stack: API on http://127.0.0.1:3001 (no Ollama container).
# Isolated project name + non-default DB/Redis host ports to avoid clashes with other stacks.
#   bash scripts/start-local-api.sh
name: cortexbuild-local

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cortexbuild-local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cortexbuild}
      # Fixed localhost-only default so restarts match the DB volume (override with POSTGRES_PASSWORD=...).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortexbuild_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cortexbuild}
    volumes:
      - cortexbuild_local_pg:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    networks:
      - local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortexbuild} -d ${POSTGRES_DB:-cortexbuild}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: cortexbuild-local-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - cortexbuild_local_redis:/data
    ports:
      - "127.0.0.1:16379:6379"
    networks:
      - local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: cortexbuild-local-api:latest
    container_name: cortexbuild-local-api
    restart: unless-stopped
    environment:
      # Use discrete DB_* from this file — do not inherit a host DATABASE_URL (Neon/Render/Vercel).
      DATABASE_URL: null
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-cortexbuild}
      DB_USER: ${POSTGRES_USER:-cortexbuild}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-cortexbuild_local_dev}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      NODE_ENV: ${NODE_ENV:-development}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:latest}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Must match Google Cloud "Authorized redirect URIs" exactly (prefer localhost over 127.0.0.1).
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/auth/google/callback}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT: ${MICROSOFT_TENANT:-common}
      MICROSOFT_CALLBACK_URL: ${MICROSOFT_CALLBACK_URL:-http://localhost:3001/api/auth/microsoft/callback}
    ports:
      - "127.0.0.1:3009:3001"
    networks:
      - local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  local:
    driver: bridge

volumes:
  cortexbuild_local_pg:
  cortexbuild_local_redis:
