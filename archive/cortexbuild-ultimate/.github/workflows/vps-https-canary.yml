# HTTPS-only checks against production (no SSH). Catches outages / TLS issues
# even when GitHub Actions cannot reach the VPS on port 22.
name: VPS HTTPS canary

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '25 */6 * * *'
  workflow_dispatch:

concurrency:
  group: vps-canary
  cancel-in-progress: false

jobs:
  health:
    name: Production health contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify www + apex are reachable
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys, urllib.request

          def check(host: str) -> None:
              url = f"https://{host}"
              req = urllib.request.Request(url, headers={"User-Agent": "cortexbuild-canary/1"})
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      code = r.getcode()
                      assert code == 200, f"HTTP {code} from {host}"
                      print(f"OK {host} (HTTP {code})")
              except Exception as e:
                  print(f"FAIL {host}: {e}")
                  sys.exit(1)

          for host in ("www.cortexbuildpro.com", "cortexbuildpro.com"):
              check(host)
          PY
