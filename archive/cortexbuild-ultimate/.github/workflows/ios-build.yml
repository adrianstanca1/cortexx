name: iOS Build

on:
  push:
    branches: [main, feature/ios-capacitor]
    paths:
      - "src/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "package.json"
      - "vite.config.ts"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "ios/**"
      - "capacitor.config.ts"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options: [debug, release]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "22"
  XCODE_VERSION: "16.2"

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npm run build
        env:
          NODE_ENV: production

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Resolve Swift Package dependencies
        working-directory: ios/App
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Download iOS platform SDK
        run: |
          # Xcode 16.2 ships without iOS 18.2 platform SDK pre-installed on
          # macos-15 runners. Both debug build and release archive need it.
          xcodebuild -downloadPlatform iOS || echo "::warning::iOS platform download failed; archive may fail"

      - name: Build iOS Debug (compile-only, generic device)
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: ios/App
        run: |
          set -o pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature NonescapableTypes' \
            build \
            | xcpretty

      - name: Build iOS Release (unsigned archive)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: ios/App
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -archivePath ./build/CortexBuild.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS='$(inherited) -enable-experimental-feature NonescapableTypes' \
            DEVELOPMENT_TEAM="" \
            | xcpretty
          echo "::notice::For signed App Store builds, use Codemagic (codemagic.yaml) — it has all SDKs pre-installed."

      - name: Package debug build
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: ios/App
        run: |
          set -euo pipefail
          # Use -print -quit instead of '| head -1' so find doesn't receive
          # SIGPIPE when head closes early (would abort under pipefail).
          APP_PATH=$(find DerivedData -name "*.app" -not -path "*/Test*" -print -quit)
          if [ -n "$APP_PATH" ]; then
            mkdir -p artifacts
            zip -r artifacts/CortexBuild-iOS-debug.zip "$APP_PATH"
            echo "Packaged $APP_PATH"
          else
            echo "No .app bundle found" >&2
            find DerivedData -name "*.app" -print
            exit 1
          fi

      - name: Upload debug build artifact
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v7
        with:
          name: CortexBuild-iOS-Debug-${{ github.sha }}
          path: ios/App/artifacts/CortexBuild-iOS-debug.zip
          retention-days: 14
          if-no-files-found: warn

      - name: Upload release archive artifact
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v7
        with:
          name: CortexBuild-xcarchive-${{ github.sha }}
          path: ios/App/build/CortexBuild.xcarchive
          retention-days: 14
          if-no-files-found: warn

  test-web:
    name: Tests & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --quiet

      - name: Unit tests
        run: npx vitest run --reporter=verbose

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production
