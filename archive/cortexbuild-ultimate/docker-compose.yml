# =============================================================================
# CortexBuild Ultimate - Optimized Docker Compose
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: cortexbuild-ultimate-api:latest
    container_name: cortexbuild-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
      # DATABASE_URL + POSTGRES_* are loaded from .env via env_file above (kept out of VCS).
      # Required keys: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB, DATABASE_URL — see .env.example.
      DB_HOST: cortexbuild-postgres
      REDIS_HOST: cortexbuild-redis
      REDIS_URL: redis://cortexbuild-redis:6379
      OLLAMA_HOST: http://172.28.0.10:11434
    ports:
      - "127.0.0.1:3009:3001"
    networks:
      - cortexbuild
    volumes:
      - ./server/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

networks:
  cortexbuild:
    external: true
