name: CortexBuild Unified CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run -r lint
      - run: pnpm run -r check

  test-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cortexbuild
          POSTGRES_PASSWORD: cortexbuild123
          POSTGRES_DB: cortexbuild_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run -r test
        env:
          DATABASE_URL: postgresql://cortexbuild:cortexbuild123@localhost:5432/cortexbuild_test?sslmode=disable
          JWT_SECRET: test-jwt-secret-12345678901234567890123456789012

  build:
    needs: [lint-and-typecheck, test-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run -r build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            packages/server/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
      HOST: ${{ secrets.VPS_HOST }}
      USER: ${{ secrets.VPS_USER }}
    steps:
      - name: Deploy to VPS
        run: |
          if [ -z "$PRIVATE_KEY" ] || [ -z "$HOST" ] || [ -z "$USER" ]; then
            echo "VPS deploy secrets (VPS_SSH_KEY / VPS_HOST / VPS_USER) not configured — skipping deploy."
            exit 0
          fi
          echo "$PRIVATE_KEY" > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no $USER@$HOST             'cd /var/www/cortexbuild-unified && git pull origin main && bash deploy.sh'
