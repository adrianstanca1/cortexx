version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: sunday
    open-pull-requests-limit: 5
    reviewers:
      - adrianstanca1
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      patch-and-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
