name: EAS Preview Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Disabled: EAS free plan exhausted until June 1, 2026
  # push:
  #   branches: [main]
  #   paths:
  #     - 'app/**'
  #     - 'src/**'
  #     - 'assets/**'
  #     - 'package*.json'
  #     - 'eas.json'
  #     - 'app.json'
  #     - 'babel.config.js'
  #     - 'metro.config.js'
  #     - '.github/workflows/eas-preview.yml'

  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - all
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - development

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.platform || 'all' }}
  cancel-in-progress: true

jobs:
  build-android:
    if: ${{ github.event.inputs.platform != 'ios' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup EAS CLI
        run: |
          npm install -g eas-cli@latest
          eas --version
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android preview
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
