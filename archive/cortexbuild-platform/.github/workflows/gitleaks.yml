name: Gitleaks
on:
  push:
    branches: [main, master, Cortexbuildpro, develop]
  pull_request:
    branches: [main, master, Cortexbuildpro, develop]
  schedule:
    - cron: '0 6 * * 1'
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
