# CortexBuild Platform v2 — API Server
# api.cortexbuildpro.com
cortexbuildpro.com
server {
    listen 80;
    listen [::]:80;
    server_name api.cortexbuildpro.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Redirect to HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.cortexbuildpro.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/cortexbuildpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cortexbuildpro.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cortexbuildpro.com/chain.pem;

    access_log /var/log/nginx/api-access.log main;
    error_log /var/log/nginx/api-error.log warn;

    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    10s;
    }

    location /api/ {
        proxy_pass http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /ws {
        proxy_pass http://websocket_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# CortexBuild Platform v2 — Web Dashboard
# app.cortexbuildpro.com
server {
    listen 80;
    listen [::]:80;
    server_name app.cortexbuildpro.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.cortexbuildpro.com;

    ssl_certificate /etc/letsencrypt/live/cortexbuildpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cortexbuildpro.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cortexbuildpro.com/chain.pem;

    access_log /var/log/nginx/web-access.log main;
    error_log /var/log/nginx/web-error.log warn;

    # Next.js static assets
    location /_next/static/ {
        alias /var/www/cortexbuild-platform/apps/web/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://web_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Legacy domain redirects
server {
    listen 80;
    listen [::]:80;
    server_name buildtrack.cortexbuildpro.com field.cortexbuildpro.com www.cortexbuildpro.com ultimate.cortexbuildpro.com web.cortexbuildpro.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://app.cortexbuildpro.com$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name buildtrack.cortexbuildpro.com field.cortexbuildpro.com www.cortexbuildpro.com ultimate.cortexbuildpro.com web.cortexbuildpro.com;

    ssl_certificate /etc/letsencrypt/live/cortexbuildpro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cortexbuildpro.com/privkey.pem;

    location / { return 301 https://app.cortexbuildpro.com$request_uri; }
}
