version: "3.9"

# CortexBuild Field — VPS Docker Compose
# Runs the API server + Nginx reverse proxy
# The Expo web build is served as static files by Nginx
#
# Usage:
#   docker compose up -d
#
# Prerequisites:
#   1. Copy .env.production to .env (fill in all values)
#   2. Run `pnpm build` to compile the server
#   3. Run `npx expo export --platform web` to build the web app
#   4. Place SSL certs at ./nginx/certs/fullchain.pem and privkey.pem

services:
  api:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./dist:/app/dist:ro
      - ./node_modules:/app/node_modules:ro
      - ./package.json:/app/package.json:ro
    command: node dist/index.js
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cortexbuild

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./dist/web:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cortexbuild

networks:
  cortexbuild:
    driver: bridge
