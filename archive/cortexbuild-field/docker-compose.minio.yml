# MinIO S3-compatible storage for CortexBuild Field
# Runs on loopback only — never binds 0.0.0.0
# Root credentials are read from /etc/minio.env (chmod 600)

services:
  minio:
    # Pin matches the image actually running on this VPS as of 2026-05-15;
    # bumped from RELEASE.2025-07-23T15-54-02Z so docker-compose up -d
    # rebuilds the container without changing version semantics.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: cortexbuild-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - /var/lib/minio/data:/data
    env_file:
      - /etc/minio.env
    environment:
      - MINIO_BROWSER_REDIRECT_URL=http://127.0.0.1:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Ensure container runs as non-root (MinIO defaults to UID 1000)
    user: "1000:1000"
