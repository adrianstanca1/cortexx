name: Seed super-admin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One-shot: creates or updates a single email+password super-admin account on
# the production database. Triggered manually from the Actions tab.
#
# Required repo secrets:
#   BOOTSTRAP_SUPERADMIN_PASSWORD  — the plaintext password (never logged;
#                                    the script hashes it before any DB write).
#
# Already-existing repo secrets reused (same as deploy.yml):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_SSH_PORT (optional), VPS_APP_DIR
#
# Why SSH instead of running the script on the GitHub runner directly?
# The production DATABASE_URL is reachable only from inside the VPS network.
# Running on the VPS reuses the already-configured local Postgres and avoids
# exposing the database to the public internet.

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Super-admin email"
        required: true
        default: "adrian.stanca1@gmail.com"
      name:
        description: "Super-admin display name"
        required: true
        default: "Adrian Stanca"
      dry_run:
        description: "Preview only — print SQL but do not write"
        type: boolean
        default: false

jobs:
  seed:
    name: Run seed-superadmin on the VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Verify the password secret is configured
        env:
          PW: ${{ secrets.BOOTSTRAP_SUPERADMIN_PASSWORD }}
        run: |
          if [ -z "$PW" ]; then
            echo "::error::BOOTSTRAP_SUPERADMIN_PASSWORD repo secret is not set."
            echo "::error::Add it under Settings → Secrets and variables → Actions, then re-run this workflow."
            exit 1
          fi
          # Mask just in case any subsequent step ever echoes it.
          echo "::add-mask::$PW"
          echo "Password secret is configured (length=${#PW} chars; never echoed)."

      - name: Run seed-superadmin on the VPS via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          BOOTSTRAP_SUPERADMIN_EMAIL: ${{ inputs.email }}
          BOOTSTRAP_SUPERADMIN_NAME: ${{ inputs.name }}
          BOOTSTRAP_SUPERADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_SUPERADMIN_PASSWORD }}
          BOOTSTRAP_SUPERADMIN_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          timeout: 60s
          command_timeout: 5m
          envs: VPS_APP_DIR,BOOTSTRAP_SUPERADMIN_EMAIL,BOOTSTRAP_SUPERADMIN_NAME,BOOTSTRAP_SUPERADMIN_PASSWORD,BOOTSTRAP_SUPERADMIN_DRY_RUN
          script: |
            set -e
            APP_DIR="${VPS_APP_DIR:-/var/www/cortexbuild-field}"
            cd "$APP_DIR"

            # The deploy workflow writes DATABASE_URL into .env on the VPS;
            # source it so the seed script can connect.
            if [ -f .env ]; then
              set -a
              # shellcheck disable=SC1091
              . ./.env
              set +a
            fi
            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL is not set in $APP_DIR/.env. Did the deploy workflow run successfully?"
              exit 1
            fi
            if ! command -v pnpm >/dev/null 2>&1; then
              corepack enable
            fi

            # If you re-run this workflow against an already-seeded DB,
            # the seed script UPSERTs (rotates the salt + hash atomically).
            pnpm seed:superadmin

      - name: Reminder — verify the live login
        if: ${{ !inputs.dry_run }}
        run: |
          echo "Seed completed. Confirm with:"
          echo ""
          echo "  VERIFY_HOST=https://field.cortexbuildpro.com \\"
          echo "  VERIFY_EMAIL='${{ inputs.email }}' \\"
          echo "  VERIFY_PASSWORD='<the-password>' \\"
          echo "  pnpm verify:superadmin"
          echo ""
          echo "Expect: 'PASS — login flow verified end-to-end.'"
