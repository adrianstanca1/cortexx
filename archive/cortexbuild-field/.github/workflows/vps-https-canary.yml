# HTTPS-only health canary against production. Catches outages and TLS
# issues even when GitHub Actions can't reach the VPS on port 22.
# Asserts the canary contract baked into /api/health by Phase 1.3 of
# docs/ROADMAP.md: { ok: true, status: "ok", checks: { postgres: true,
# redis: true } }.
#
# Security note: this workflow does NOT consume any untrusted github
# event inputs (no issue titles / PR bodies / commit messages). Triggers
# are limited to schedule + workflow_dispatch; all URLs are hardcoded.
name: VPS HTTPS canary

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every 4 hours, offset 15 min from the cortexbuild-ultimate canary so
    # they don't burst the VPS at the same moment.
    - cron: '15 */4 * * *'
  workflow_dispatch:

concurrency:
  group: vps-canary
  cancel-in-progress: false

jobs:
  health:
    name: Production health contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify field API health
        run: |
          set -euo pipefail
          curl -sSL --max-time 15 -4 https://field.cortexbuildpro.com/api/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          c = d.get('checks') or {}
          assert d.get('ok') is True, f'ok!=True: {d}'
          assert d.get('status') == 'ok', f'status!=ok: {d}'
          assert c.get('postgres') is True, f'postgres!=true: {d}'
          assert c.get('redis') is True, f'redis!=true: {d}'
          assert c.get('minio') is True, f'minio!=true: {d}'
          print(f\"OK field health (sha={d.get('sha', '?')[:8]})\")
          "

      - name: Verify field /api/version reports a real commit
        run: |
          set -euo pipefail
          curl -sS -4 https://field.cortexbuildpro.com/api/version | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          sha = d.get('sha', '')
          assert sha and sha != 'unknown' and len(sha) >= 7, f'sha looks bogus: {d}'
          print(f'OK /api/version sha={sha[:8]}')
          "

      - name: Verify www / apex serve the Expo web export
        run: |
          set -euo pipefail
          for host in www.cortexbuildpro.com cortexbuildpro.com; do
            page=$(curl -sSL -4 --max-time 15 -H 'Cache-Control: no-cache' "https://$host/")
            if ! echo "$page" | grep -q "/_expo/static/js/web/"; then
              echo "::error::https://$host/ does not serve the Expo web bundle"
              exit 1
            fi
            echo "OK https://$host/ serves /_expo/ bundle"
          done
