<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Project Portal · CortexBuild Pro</title>
<style>
  :root{
    --bg:#0b0f15; --bg2:#141a23; --bg3:#1d2530; --hair:rgba(255,255,255,.07);
    --hairMid:rgba(255,255,255,.14); --t1:#eef3fa; --t2:#9fb0c3; --t3:#63748a;
    --accent:#2563eb; --green:#1f8a5b; --amber:#d4901f; --red:#e0533d; --purple:#7c5cff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--t1);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .mono{font-family:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,monospace}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .hero{padding:28px 22px 22px;background:linear-gradient(150deg,rgba(124,92,255,.22),rgba(37,99,235,.10))}
  .brandrow{display:flex;align-items:center;gap:9px;margin-bottom:18px}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
  .badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
    color:#fff;background:var(--purple);border-radius:20px;padding:4px 10px}
  h1{font-size:25px;letter-spacing:-.6px;margin:14px 0 4px;line-height:1.12}
  .sub{color:var(--t2);font-size:13px}
  .section{padding:6px 18px 4px}
  .sectitle{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);
    margin:18px 4px 9px}
  .card{background:var(--bg2);border:.5px solid var(--hair);border-radius:16px;padding:16px;margin-bottom:8px}
  .progress{height:8px;border-radius:5px;background:var(--bg3);overflow:hidden;margin-top:10px}
  .progress > i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--purple))}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:.5px solid var(--hair)}
  .row:last-child{border-bottom:none}
  .pill{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;border-radius:7px;padding:3px 8px}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .n{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .stat .l{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .updates .u{display:flex;gap:11px;padding:11px 0;border-bottom:.5px solid var(--hair)}
  .updates .u:last-child{border-bottom:none}
  .dot{width:8px;height:8px;border-radius:4px;margin-top:5px;flex-shrink:0;background:var(--accent)}
  .foot{margin-top:auto;padding:24px 22px 34px;text-align:center;color:var(--t3);font-size:11px;line-height:1.6}
  .foot a{color:var(--t2);text-decoration:none}
  .cta{display:block;width:100%;margin:14px 0 2px;background:var(--accent);color:#fff;border:none;border-radius:13px;
    padding:15px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none}
  .err{padding:60px 28px;text-align:center}
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script>
// ── Embedded project snapshot (the portal is fully standalone/offline) ──────
var PROJECTS = [
  { id:1, name:'Camden Mews Refurb',      client:'J. Patterson',     value:185000, pct:68,  status:'active',    addr:'Camden, NW1',    due:'2026-06-19', team:4 },
  { id:2, name:'Hackney Loft Conversion', client:'Eve & Mark Lin',   value:42000,  pct:22,  status:'active',    addr:'Hackney, E8',    due:'2026-07-17', team:2 },
  { id:3, name:'Brixton Shopfront',       client:'Tonic Café Ltd',   value:28000,  pct:90,  status:'snagging',  addr:'Brixton, SW9',   due:'2026-05-27', team:3 },
  { id:4, name:'Islington Extension',     client:'B. Khoury',        value:96000,  pct:0,   status:'quoting',   addr:'Islington, N1',  due:null,         team:0 },
  { id:5, name:'Streatham Reroof',        client:'Park Towers Mgmt', value:64000,  pct:100, status:'complete',  addr:'Streatham, SW16',due:'2026-03-30', team:0 },
];
var INVOICES = [
  { id:'INV-2038', projectId:1, amount:37000, status:'paid' },
  { id:'INV-2040', projectId:1, amount:55000, status:'paid' },
  { id:'INV-2042', projectId:1, amount:8420,  status:'due'  },
  { id:'INV-2039', projectId:3, amount:3890,  status:'overdue' },
  { id:'INV-2041', projectId:2, amount:1900,  status:'due'  },
];
var UPDATES = {
  1:[['Aisha completed first-fix electrics — kitchen','2 days ago','var(--amber)'],
     ['Tom uploaded 4 progress photos','2 days ago','var(--accent)'],
     ['Plasterboard delivery booked for Thursday','3 days ago','var(--accent)']],
  2:[['Steels craned in, structural sign-off passed','1 day ago','var(--green)'],
     ['Roof light apertures cut','4 days ago','var(--accent)']],
  3:[['Snag list 90% cleared — final clean booked','1 day ago','var(--green)'],
     ['Shopfront glazing installed','5 days ago','var(--accent)']],
  4:[['Quote issued — awaiting your approval','2 days ago','var(--purple)']],
  5:[['Project complete — handover pack sent','9 weeks ago','var(--green)']],
};
var STATUS_C = { active:'var(--accent)', snagging:'var(--amber)', quoting:'var(--purple)', complete:'var(--green)' };

function gbp(n){ return '£'+Number(n||0).toLocaleString('en-GB'); }
function el(html){ var d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }

// ── Resolve the token → project ─────────────────────────────────────────────
function resolve(){
  var m = location.pathname.match(/\/p\/([^/?#]+)/);
  var token = (m && m[1]) || new URLSearchParams(location.search).get('pt') || new URLSearchParams(location.search).get('t') || '';
  // token = base64( "<projectId>:<clientNoSpaces>" ), truncated to 18 chars
  for (var i=0;i<PROJECTS.length;i++){
    var p = PROJECTS[i];
    var raw = p.id + ':' + (p.client||'client').replace(/[^a-zA-Z0-9]/g,'');
    var enc = btoa(raw).replace(/=+$/,'').slice(0,18);
    if (enc === token) return p;
  }
  // dev fallback: ?project=1
  var pid = new URLSearchParams(location.search).get('project');
  if (pid) { for (var j=0;j<PROJECTS.length;j++){ if (PROJECTS[j].id==pid) return PROJECTS[j]; } }
  return null;
}

function render(){
  var root = document.getElementById('root');
  var p = resolve();
  if (!p){
    root.appendChild(el('<div class="err"><div class="logo" style="margin:0 auto 16px">C</div>'+
      '<h1 style="font-size:20px">Link not recognised</h1>'+
      '<p class="sub">This portal link may have expired. Ask your contractor for an up-to-date link.</p></div>'));
    return;
  }
  var invs = INVOICES.filter(function(i){return i.projectId===p.id;});
  var invoiced = invs.reduce(function(s,i){return s+i.amount;},0);
  var paid = invs.filter(function(i){return i.status==='paid';}).reduce(function(s,i){return s+i.amount;},0);
  var ups = UPDATES[p.id] || [];
  var dueStr = p.due ? new Date(p.due).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : 'TBC';

  // Hero
  root.appendChild(el(
    '<div class="hero">'+
      '<div class="brandrow"><div class="logo">C</div><div style="font-weight:700;font-size:14px">CortexBuild Ltd</div>'+
        '<span class="badge" style="margin-left:auto">Client Portal</span></div>'+
      '<span class="pill" style="background:'+(STATUS_C[p.status]||'var(--accent)')+';color:#fff">'+p.status+'</span>'+
      '<h1>'+p.name+'</h1>'+
      '<div class="sub">'+p.addr+' · for '+p.client+'</div>'+
      '<div class="progress"><i style="width:'+p.pct+'%"></i></div>'+
      '<div class="sub" style="margin-top:7px">'+p.pct+'% complete · target handover '+dueStr+'</div>'+
    '</div>'
  ));

  // Stats
  var s = el('<div class="section"><div class="card"><div class="grid3">'+
    '<div class="stat"><span class="n">'+p.pct+'%</span><span class="l">Complete</span></div>'+
    '<div class="stat"><span class="n">'+p.team+'</span><span class="l">On site</span></div>'+
    '<div class="stat"><span class="n">'+gbp(p.value)+'</span><span class="l">Contract</span></div>'+
    '</div></div></div>');
  root.appendChild(s);

  // Updates
  if (ups.length){
    var u = el('<div class="section"><div class="sectitle">Recent site updates</div><div class="card updates"></div></div>');
    var cont = u.querySelector('.updates');
    ups.forEach(function(x){
      cont.appendChild(el('<div class="u"><span class="dot" style="background:'+x[2]+'"></span>'+
        '<div><div style="font-size:14px;line-height:1.35">'+x[0]+'</div>'+
        '<div class="sub" style="font-size:11px;margin-top:2px">'+x[1]+'</div></div></div>'));
    });
    root.appendChild(u);
  }

  // Billing
  if (invs.length){
    var b = el('<div class="section"><div class="sectitle">Billing summary</div><div class="card"></div></div>');
    var card = b.querySelector('.card');
    card.appendChild(el('<div class="row"><span class="sub">Invoiced to date</span><span class="mono" style="font-weight:700">'+gbp(invoiced)+'</span></div>'));
    card.appendChild(el('<div class="row"><span class="sub">Paid</span><span class="mono" style="font-weight:700;color:var(--green)">'+gbp(paid)+'</span></div>'));
    if (invoiced-paid>0) card.appendChild(el('<div class="row"><span class="sub">Outstanding</span><span class="mono" style="font-weight:700;color:var(--amber)">'+gbp(invoiced-paid)+'</span></div>'));
    root.appendChild(b);
  }

  // Quote approval CTA for quoting projects
  if (p.status==='quoting'){
    var q = el('<div class="section"><div class="card" style="text-align:center">'+
      '<div style="font-size:15px;font-weight:700;margin-bottom:4px">Your quote is ready</div>'+
      '<div class="sub" style="margin-bottom:6px">Review the proposal for '+p.name+' and approve to get started.</div>'+
      '<a class="cta" id="approve">Approve quote</a></div></div>');
    root.appendChild(q);
    q.querySelector('#approve').addEventListener('click',function(){
      this.textContent='✓ Approved — thank you!';
      this.style.background='var(--green)';
      try{ localStorage.setItem('cortexx_portal_approved_'+p.id,'1'); }catch(e){}
      try{
        var KEY='cortexx_portal_messages';
        var list=JSON.parse(localStorage.getItem(KEY)||'[]');
        list.unshift({ id:Date.now(), projectId:p.id, project:p.name, client:p.client,
          text:'✓ Approved the quote for '+p.name+'. Ready to get started!',
          when:new Date().toISOString(), read:false, system:true, kind:'approval' });
        localStorage.setItem(KEY, JSON.stringify(list.slice(0,200)));
      }catch(e){}
    });
  }

  // Documents — client can download shared files (generated as simple text/PDF stubs)
  var DOCS = {
    1:[['Building contract.pdf','Signed · 12 Mar'],['Schedule of works.pdf','Rev 3 · 2 May'],['Progress photos.zip','24 images']],
    2:[['Structural calcs.pdf','Approved · 28 May'],['Planning approval.pdf','Granted']],
    3:[['Snag list.pdf','Updated 1 Jun'],['Handover pack.pdf','Draft']],
    4:[['Quotation.pdf','Issued · 3 Jun']],
    5:[['Handover pack.pdf','Final'],['Warranty.pdf','10 year'],['As-built drawings.pdf','Complete']],
  };
  var docs = DOCS[p.id] || [];
  if (docs.length){
    var dwrap = el('<div class="section"><div class="sectitle">Documents</div><div class="card"></div></div>');
    var dcard = dwrap.querySelector('.card');
    docs.forEach(function(d){
      var rowEl = el('<div class="row" style="cursor:pointer"><div><div style="font-size:14px;font-weight:600">'+d[0]+'</div>'+
        '<div class="sub" style="font-size:11px;margin-top:1px">'+d[1]+'</div></div>'+
        '<span class="pill" style="background:var(--bg3);color:var(--t2)">↓ Download</span></div>');
      rowEl.addEventListener('click', function(){
        var blob = new Blob(['CortexBuild Pro — '+d[0]+'\nProject: '+p.name+'\nClient: '+p.client+'\n\n'+
          'This document was shared via your project portal.\nContact CortexBuild Ltd for the full file.'],{type:'text/plain'});
        var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
        a.download=d[0].replace(/\.(pdf|zip)$/,'.txt'); a.click();
        setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
      });
      dcard.appendChild(rowEl);
    });
    root.appendChild(dwrap);
  }

  // Message-back form — client can send a note to the contractor
  var msgWrap = el('<div class="section"><div class="sectitle">Message your contractor</div>'+
    '<div class="card">'+
      '<textarea id="msg" rows="3" placeholder="Ask a question or leave a note…" '+
        'style="width:100%;background:var(--bg3);border:.5px solid var(--hairMid);border-radius:10px;'+
        'padding:12px;color:var(--t1);font-family:inherit;font-size:14px;outline:none;resize:vertical;box-sizing:border-box"></textarea>'+
      '<a class="cta" id="send" style="margin-top:10px">Send message</a>'+
    '</div></div>');
  root.appendChild(msgWrap);
  msgWrap.querySelector('#send').addEventListener('click', function(){
    var ta = msgWrap.querySelector('#msg');
    var text = (ta.value||'').trim();
    if (!text){ ta.focus(); return; }
    try {
      var KEY = 'cortexx_portal_messages';
      var list = JSON.parse(localStorage.getItem(KEY) || '[]');
      list.unshift({ id: Date.now(), projectId: p.id, project: p.name, client: p.client, text: text, when: new Date().toISOString(), read: false });
      localStorage.setItem(KEY, JSON.stringify(list.slice(0, 200)));
    } catch(e){}
    this.textContent = '✓ Sent — your contractor will reply';
    this.style.background = 'var(--green)';
    ta.value = ''; ta.disabled = true;
  });

  root.appendChild(el('<div class="foot">This is a live, read-only view of your project, shared by your contractor.<br/>'+
    'Powered by <a href="Cortexx Marketing.html">CortexBuild Pro</a> · the construction OS.</div>'));
}
render();
</script>
</body>
</html>
